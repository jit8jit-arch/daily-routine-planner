<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Routine Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --surface: #12141c; --accent: #6366f1;
            --text: #f8fafc; --dim: #94a3b8; --border: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
        }

        body, html { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100%; overflow: hidden; }

        /* ONBOARDING SCREEN */
        #onboarding {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;
        }
        #onboarding h1 { font-weight: 800; font-size: 2rem; margin-bottom: 10px; }
        
        /* ILLUMINATION ANIMATION */
        @keyframes illuminate {
            0% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); border-color: rgba(99, 102, 241, 0.3); }
            50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.6); border-color: var(--accent); }
            100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); border-color: rgba(99, 102, 241, 0.3); }
        }

        .active-task {
            animation: illuminate 3s infinite ease-in-out;
            background: linear-gradient(135deg, #12141c 0%, #1e1e2d 100%);
            border-width: 2px !important;
        }

        /* HEADER & STATS */
        header { padding: calc(var(--safe-top) + 20px) 25px 10px; }
        .stats-bar { 
            background: var(--surface); border: 1px solid var(--border); 
            padding: 15px; border-radius: 20px; margin-top: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .progress-circle { width: 40px; height: 40px; border-radius: 50%; border: 3px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; }

        /* DAY SELECTOR FIX */
        .day-container { display: flex; justify-content: space-between; gap: 8px; margin: 15px 0; }
        .day-pill {
            flex: 1; padding: 12px 0; border-radius: 12px; border: 1px solid var(--border);
            background: var(--surface); color: var(--dim); font-size: 0.7rem; font-weight: 800;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .day-pill.selected { background: var(--accent); color: white; border-color: var(--accent); }

        /* UI ELEMENTS */
        .content { height: calc(100vh - 200px); overflow-y: auto; padding: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
        .input-group input { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: 16px; color: white; margin-bottom: 12px; }
        
        nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px; height: 70px;
            background: rgba(18, 20, 28, 0.9); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 25px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { color: var(--dim); text-decoration: none; font-size: 0.7rem; font-weight: 800; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<div id="onboarding">
    <h1>Welcome</h1>
    <p style="color:var(--dim)">How should the app address you?</p>
    <input type="text" id="user-name-input" class="input-group" style="background:#1a1d27; border:1px solid #333; padding:15px; border-radius:12px; color:white; text-align:center; width:80%;" placeholder="Enter your name">
    <button onclick="saveName()" style="margin-top:20px; background:var(--accent); color:white; border:none; padding:15px 40px; border-radius:12px; font-weight:800;">Get Started</button>
</div>

<header id="main-header" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <div style="color:var(--dim); font-size:0.7rem; font-weight:800; letter-spacing:1px;" id="date-label">TUESDAY</div>
            <div style="font-size:1.4rem; font-weight:800;" id="greet-text">Hello, User</div>
        </div>
        <div id="clock" style="font-size:1.5rem; font-weight:300;">12:00</div>
    </div>
    <div class="stats-bar">
        <div>
            <div style="font-size:0.8rem; font-weight:800;">Daily Productivity</div>
            <div style="font-size:0.6rem; color:var(--dim)" id="stats-desc">0 tasks completed</div>
        </div>
        <div class="progress-circle" id="stat-perc">0%</div>
    </div>
</header>

<div class="content" id="main-content" style="display:none">
    <div id="page-list"></div>
    
    <div id="page-add" style="display:none">
        <h2 style="font-weight:800;">Add Activity</h2>
        <div class="input-group"><input type="text" id="task-name" placeholder="E.g. Morning Yoga"></div>
        <div style="display:flex; gap:10px;">
            <input type="time" id="task-start" value="08:00" style="flex:1; background:var(--surface); border:1px solid var(--border); padding:12px; border-radius:12px; color:white;">
            <input type="time" id="task-end" value="09:00" style="flex:1; background:var(--surface); border:1px solid var(--border); padding:12px; border-radius:12px; color:white;">
        </div>
        <div class="day-container" id="day-picker">
            <div class="day-pill selected" onclick="this.classList.toggle('selected')">S</div>
            <div class="day-pill selected" onclick="this.classList.toggle('selected')">M</div>
            <div class="day-pill selected" onclick="this.classList.toggle('selected')">T</div>
            <div class="day-pill selected" onclick="this.classList.toggle('selected')">W</div>
            <div class="day-pill selected" onclick="this.classList.toggle('selected')">T</div>
            <div class="day-pill selected" onclick="this.classList.toggle('selected')">F</div>
            <div class="day-pill selected" onclick="this.classList.toggle('selected')">S</div>
        </div>
        <button onclick="addTask()" style="width:100%; padding:20px; background:var(--accent); color:white; border:none; border-radius:18px; font-weight:800; margin-top:10px;">Save Ritual</button>
    </div>
</div>

<nav id="main-nav" style="display:none">
    <div class="nav-item active" onclick="showPage('list')"><span>📅</span><span>ROUTINE</span></div>
    <div class="nav-item" onclick="showPage('add')"><span>⊕</span><span>NEW</span></div>
</nav>

<script>
    let tasks = JSON.parse(localStorage.getItem('tasks_v2')) || [];
    let userName = localStorage.getItem('user_name');

    function init() {
        if (!userName) {
            document.getElementById('onboarding').style.display = 'flex';
        } else {
            launchApp();
        }
        setInterval(updateTime, 1000);
    }

    function saveName() {
        const val = document.getElementById('user-name-input').value;
        if(val.length < 2) return alert("Please enter a valid name");
        localStorage.setItem('user_name', val);
        userName = val;
        launchApp();
    }

    function launchApp() {
        document.getElementById('onboarding').style.display = 'none';
        document.getElementById('main-header').style.display = 'block';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('main-nav').style.display = 'flex';
        document.getElementById('greet-text').innerText = `Hello, ${userName}`;
        render();
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
        const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        document.getElementById('date-label').innerText = days[now.getDay()];
        if(now.getSeconds() === 0) render();
    }

    function render() {
        const list = document.getElementById('page-list');
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const todayIdx = now.getDay();
        
        const todaysTasks = tasks.filter(t => t.days.includes(todayIdx)).sort((a,b) => a.start.localeCompare(b.start));
        
        // Update Stats
        const completed = todaysTasks.filter(t => {
            const [h, m] = t.end.split(':').map(Number);
            return (h * 60 + m) < nowMin;
        }).length;
        const total = todaysTasks.length;
        const perc = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('stats-desc').innerText = `${completed} of ${total} rituals finished`;
        document.getElementById('stat-perc').innerText = `${perc}%`;

        list.innerHTML = todaysTasks.map(t => {
            const s = t.start.split(':').map(Number);
            const e = t.end.split(':').map(Number);
            const sMin = s[0] * 60 + s[1];
            const eMin = e[0] * 60 + e[1];
            const isActive = nowMin >= sMin && nowMin < eMin;

            return `
                <div class="card ${isActive ? 'active-task' : ''}" style="opacity: ${nowMin > eMin ? '0.4' : '1'}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="color:var(--accent); font-weight:800; font-size:0.7rem;">${t.start} — ${t.end}</span>
                        ${isActive ? '<span style="font-size:0.6rem; font-weight:800; color:var(--accent)">LIVE</span>' : ''}
                    </div>
                    <div style="font-size:1.2rem; font-weight:800; margin-top:5px;">${t.name}</div>
                </div>
            `;
        }).join('');
    }

    function showPage(p) {
        document.getElementById('page-list').style.display = p === 'list' ? 'block' : 'none';
        document.getElementById('page-add').style.display = p === 'add' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach((n, i) => {
            n.classList.toggle('active', (i === 0 && p === 'list') || (i === 1 && p === 'add'));
        });
    }

    function addTask() {
        const name = document.getElementById('task-name').value;
        const start = document.getElementById('task-start').value;
        const end = document.getElementById('task-end').value;
        const days = Array.from(document.querySelectorAll('#day-picker .day-pill'))
                          .map((p, i) => p.classList.contains('selected') ? i : null)
                          .filter(v => v !== null);

        if(!name) return;
        tasks.push({ name, start, end, days });
        localStorage.setItem('tasks_v2', JSON.stringify(tasks));
        document.getElementById('task-name').value = '';
        showPage('list');
        render();
    }

    init();
</script>
</body>
</html>
