<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-狠translucent">
    <meta name="theme-color" content="#0f1117">
    <title>Routine Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117; --card: #1a1d27; --accent: #f0a500;
            --text: #ffffff; --muted: #8e8e93; --red: #ff453a;
            --green: #34c759; --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            padding: calc(var(--safe-top) + 15px) 20px 15px;
            background: var(--card); border-bottom: 1px solid #2c2c2e;
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { margin: 0; font-size: 1.2rem; color: var(--accent); }
        .clock { font-weight: 700; font-size: 1rem; color: var(--accent); }

        /* TAB SYSTEM */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARDS & INPUTS */
        .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid #2c2c2e; }
        label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
        input[type="time"], input[type="text"] {
            width: 100%; background: #000; border: 1px solid #3a3a3c; color: #fff;
            padding: 12px; border-radius: 10px; font-size: 1rem; margin-bottom: 15px;
        }

        /* DAY SELECTOR (WEEKLY FEATURE) */
        .day-grid { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 15px; }
        .day-box { flex: 1; position: relative; }
        .day-box input { position: absolute; opacity: 0; width: 0; height: 0; }
        .day-box label { 
            display: block; background: #2c2c2e; text-align: center; padding: 10px 0;
            border-radius: 8px; font-size: 0.7rem; color: #fff; transition: 0.2s;
        }
        .day-box input:checked + label { background: var(--accent); color: #000; font-weight: 700; }

        /* ACTIVITY CHIPS */
        .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .chip { 
            padding: 8px 16px; background: #2c2c2e; border-radius: 20px; font-size: 0.85rem; 
            border: 1px solid transparent; transition: 0.2s;
        }
        .chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(240,165,0,0.1); }

        /* SLOT ITEMS */
        .slot { 
            background: var(--card); border-radius: 15px; padding: 16px; margin-bottom: 12px;
            border-left: 4px solid transparent; position: relative;
        }
        .slot.active-now { 
            border-left-color: var(--accent); background: linear-gradient(90deg, rgba(240,165,0,0.1) 0%, var(--card) 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .slot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .slot-time { font-weight: 700; font-size: 0.9rem; color: var(--accent); }
        .slot-actions button { background: none; border: none; font-size: 1.1rem; margin-left: 10px; cursor: pointer; }
        .tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { background: #3a3a3c; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; }

        /* NAV BAR */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--card); border-top: 1px solid #2c2c2e;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn { background: none; border: none; color: var(--muted); text-align: center; flex: 1; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn span { display: block; font-size: 1.2rem; }
        .nav-btn small { font-size: 0.65rem; font-weight: 600; }

        .btn-primary { 
            width: 100%; background: var(--accent); color: #000; border: none; 
            padding: 15px; border-radius: 12px; font-weight: 700; font-size: 1rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Routine Planner</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<div class="content">
    <div id="view" class="page active">
        <label id="today-label">Today's Schedule</label>
        <div id="slot-container"></div>
    </div>

    <div id="add" class="page">
        <h2 id="form-title" style="font-size: 1.2rem; margin-bottom: 20px;">Add New Slot</h2>
        <div class="card">
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"><label>Start</label><input type="time" id="startTime" value="06:00"></div>
                <div style="flex: 1;"><label>End</label><input type="time" id="endTime" value="07:00"></div>
            </div>
            
            <label>Repeat Weekly (Default: All)</label>
            <div class="day-grid">
                <div class="day-box"><input type="checkbox" id="d0" value="0" checked><label for="d0">S</label></div>
                <div class="day-box"><input type="checkbox" id="d1" value="1" checked><label for="d1">M</label></div>
                <div class="day-box"><input type="checkbox" id="d2" value="2" checked><label for="d2">T</label></div>
                <div class="day-box"><input type="checkbox" id="d3" value="3" checked><label for="d3">W</label></div>
                <div class="day-box"><input type="checkbox" id="d4" value="4" checked><label for="d4">T</label></div>
                <div class="day-box"><input type="checkbox" id="d5" value="5" checked><label for="d5">F</label></div>
                <div class="day-box"><input type="checkbox" id="d6" value="6" checked><label for="d6">S</label></div>
            </div>

            <label>Activities</label>
            <div class="chip-grid" id="preset-chips"></div>
            
            <label>Reminder</label>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                <input type="checkbox" id="reminder-toggle" style="width:20px; height:20px;">
                <span>Notify me when this starts</span>
            </div>

            <button class="btn-primary" onclick="saveSlot()">Save to Timetable</button>
            <button id="cancel-edit" style="display:none; width:100%; background:none; color:var(--muted); border:none; margin-top:10px;" onclick="resetForm()">Cancel</button>
        </div>
    </div>
</div>

<nav>
    <button class="nav-btn active" onclick="showPage('view', this)"><span>📅</span><small>SCHEDULE</small></button>
    <button class="nav-btn" onclick="showPage('add', this)"><span>➕</span><small>ADD NEW</small></button>
</nav>

<script>
    const PRESETS = ["Cooking", "Cleaning", "Exercise", "Work", "Reading", "Kid's Time", "Prayer", "Bedtime"];
    let slots = JSON.parse(localStorage.getItem('routine_slots')) || [];
    let selectedActivities = [];
    let editingId = null;

    // INITIALIZE
    function init() {
        const chipContainer = document.getElementById('preset-chips');
        PRESETS.forEach(p => {
            const div = document.createElement('div');
            div.className = 'chip';
            div.innerText = p;
            div.onclick = () => toggleChip(p, div);
            chipContainer.appendChild(div);
        });
        renderSchedule();
        updateClock();
        setInterval(updateClock, 1000);
    }

    function toggleChip(activity, element) {
        if (selectedActivities.includes(activity)) {
            selectedActivities = selectedActivities.filter(a => a !== activity);
            element.classList.remove('selected');
        } else {
            selectedActivities.push(activity);
            element.classList.add('selected');
        }
    }

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
        if(pageId === 'view') renderSchedule();
    }

    function saveSlot() {
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const reminder = document.getElementById('reminder-toggle').checked;
        const days = Array.from(document.querySelectorAll('.day-box input:checked')).map(i => parseInt(i.value));

        if (!selectedActivities.length) return alert("Select at least one activity");

        const newSlot = {
            id: editingId || Date.now(),
            start, end, days, reminder,
            activities: [...selectedActivities]
        };

        if (editingId) {
            slots = slots.map(s => s.id === editingId ? newSlot : s);
        } else {
            slots.push(newSlot);
        }

        slots.sort((a, b) => a.start.localeCompare(b.start));
        localStorage.setItem('routine_slots', JSON.stringify(slots));
        resetForm();
        showPage('view', document.querySelector('.nav-btn'));
    }

    function resetForm() {
        editingId = null;
        selectedActivities = [];
        document.getElementById('form-title').innerText = "Add New Slot";
        document.getElementById('cancel-edit').style.display = 'none';
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        document.querySelectorAll('.day-box input').forEach(i => i.checked = true);
    }

    function renderSchedule() {
        const container = document.getElementById('slot-container');
        const today = new Date().getDay();
        const nowStr = new Date().toTimeString().slice(0,5);
        
        container.innerHTML = '';
        const todaysSlots = slots.filter(s => s.days.includes(today));

        if (!todaysSlots.length) {
            container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--muted);">No activities today.</div>';
            return;
        }

        todaysSlots.forEach(s => {
            const isActive = nowStr >= s.start && nowStr < s.end;
            const div = document.createElement('div');
            div.className = `slot ${isActive ? 'active-now' : ''}`;
            div.innerHTML = `
                ${isActive ? '<span style="color:var(--accent); font-size:0.7rem; font-weight:800;">● ACTIVE NOW</span>' : ''}
                <div class="slot-header">
                    <div class="slot-time">${formatTime(s.start)} - ${formatTime(s.end)}</div>
                    <div class="slot-actions">
                        <button onclick="editSlot(${s.id})">✏️</button>
                        <button onclick="deleteSlot(${s.id})">🗑️</button>
                    </div>
                </div>
                <div class="tag-row">${s.activities.map(a => `<div class="tag">${a}</div>`).join('')}</div>
                ${s.reminder ? '<div style="font-size:0.6rem; color:var(--muted); margin-top:8px;">🔔 Reminder set</div>' : ''}
            `;
            container.appendChild(div);
        });
    }

    function formatTime(t) {
        const [h, m] = t.split(':');
        const hh = parseInt(h);
        return `${hh % 12 || 12}:${m} ${hh >= 12 ? 'PM' : 'AM'}`;
    }

    function deleteSlot(id) {
        if(confirm("Delete this slot?")) {
            slots = slots.filter(s => s.id !== id);
            localStorage.setItem('routine_slots', JSON.stringify(slots));
            renderSchedule();
        }
    }

    function editSlot(id) {
        const s = slots.find(item => item.id === id);
        editingId = id;
        document.getElementById('startTime').value = s.start;
        document.getElementById('endTime').value = s.end;
        document.getElementById('reminder-toggle').checked = s.reminder;
        document.getElementById('form-title').innerText = "Edit Time Slot";
        document.getElementById('cancel-edit').style.display = 'block';
        
        // Reset and set chips
        selectedActivities = [...s.activities];
        document.querySelectorAll('.chip').forEach(chip => {
            chip.classList.toggle('selected', selectedActivities.includes(chip.innerText));
        });

        // Set days
        document.querySelectorAll('.day-box input').forEach(input => {
            input.checked = s.days.includes(parseInt(input.value));
        });

        showPage('add', document.querySelectorAll('.nav-btn')[1]);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toTimeString().slice(0, 5);
        
        // Basic Logic for Visual "Reminders"
        const nowStr = now.toTimeString().slice(0,5);
        slots.forEach(s => {
            if (s.start === nowStr && s.reminder && now.getSeconds() === 0) {
                // Check if browser supports notifications
                if (Notification.permission === "granted") {
                    new Notification("Activity Starting!", { body: s.activities.join(", ") });
                } else {
                    alert("⏰ STARTING: " + s.activities.join(", "));
                }
            }
        });
    }

    // Ask for notification permission
    if ("Notification" in window) Notification.requestPermission();

    init();
</script>
</body>
</html>
