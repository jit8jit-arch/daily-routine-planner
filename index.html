<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1117">
    <title>Routine Pro Master</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f1117; --card: #1a1d27; --accent: #f0a500;
            --text: #ffffff; --muted: #a0a0ab; --red: #ff453a;
            --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            padding: calc(var(--safe-top) + 15px) 20px 15px;
            background: var(--card); border-bottom: 1px solid #2c2c2e;
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { margin: 0; font-size: 1.1rem; color: var(--accent); font-weight: 900; }
        .clock { font-weight: 800; font-size: 1rem; color: var(--accent); background: rgba(240,165,0,0.1); padding: 5px 12px; border-radius: 30px; }

        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; }

        /* ALIGNED TIME INPUTS */
        .time-input-container {
            display: flex; gap: 12px; margin-bottom: 20px;
        }
        .time-box { flex: 1; display: flex; flex-direction: column; }
        input[type="time"] {
            width: 100%; background: #000; border: 2px solid #3a3a3c; color: #fff;
            padding: 12px; border-radius: 12px; font-size: 1rem; outline: none;
            appearance: none; -webkit-appearance: none;
        }

        /* WEEKLY TABLE VIEW */
        .table-wrap { width: 100%; overflow-x: auto; background: var(--card); border-radius: 12px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th, td { border: 1px solid #3a3a3c; padding: 8px; text-align: left; vertical-align: top; }
        th { color: var(--accent); background: #000; }

        /* CARDS & TAGS */
        .slot { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #2c2c2e; position: relative; }
        .active-now { border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(240,165,0,0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
        
        .tag-row { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .big-tag { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; }
        .tag-text { font-size: 1.1rem; font-weight: 900; }

        /* DAY SELECTOR */
        .day-grid { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 20px; }
        .day-box { flex: 1; }
        .day-box input { display: none; }
        .day-box label { display: block; background: #2c2c2e; text-align: center; padding: 10px 0; border-radius: 8px; font-size: 0.7rem; color: #fff; }
        .day-box input:checked + label { background: var(--accent); color: #000; font-weight: 800; }

        /* NAV */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--card);
            border-top: 1px solid #2c2c2e; display: flex; justify-content: space-around; padding-bottom: 15px;
        }
        .nav-btn { background: none; border: none; color: var(--muted); flex: 1; }
        .nav-btn.active { color: var(--accent); }
        
        .btn-action { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; margin-top: 10px; }
        .btn-pdf { background: #3a3a3c; color: #fff; margin-top: 10px; border: none; padding: 10px; border-radius: 8px; font-weight: 600; width: 100%; }
    </style>
</head>
<body>

<header>
    <h1>ROUTINE PRO</h1>
    <div class="clock" id="clock">--:-- --</div>
</header>

<div class="content">
    <div id="view" class="page active">
        <div id="slot-container"></div>
        <button class="btn-pdf" onclick="exportPDF('slot-container', 'Daily_Routine')">📄 Save Daily as PDF</button>
    </div>

    <div id="weekly" class="page">
        <h2 style="font-size: 1.2rem; color: var(--accent);">Weekly Timetable</h2>
        <div id="weekly-table-area" class="table-wrap">
            <table id="main-table">
                <thead><tr><th>Time</th><th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <button class="btn-pdf" onclick="exportPDF('weekly-table-area', 'Weekly_Timetable')">📄 Save Weekly as PDF</button>
    </div>

    <div id="add" class="page">
        <h2 id="form-title">Plan Task</h2>
        <div class="time-input-container">
            <div class="time-box"><label style="font-size:0.7rem; color:var(--muted); margin-bottom:5px;">START</label><input type="time" id="startTime" value="06:00"></div>
            <div class="time-box"><label style="font-size:0.7rem; color:var(--muted); margin-bottom:5px;">END</label><input type="time" id="endTime" value="07:00"></div>
        </div>

        <label style="font-size:0.7rem; color:var(--muted);">REPEAT ON</label>
        <div class="day-grid">
            <div class="day-box"><input type="checkbox" id="d0" value="0" checked><label for="d0">S</label></div>
            <div class="day-box"><input type="checkbox" id="d1" value="1" checked><label for="d1">M</label></div>
            <div class="day-box"><input type="checkbox" id="d2" value="2" checked><label for="d2">T</label></div>
            <div class="day-box"><input type="checkbox" id="d3" value="3" checked><label for="d3">W</label></div>
            <div class="day-box"><input type="checkbox" id="d4" value="4" checked><label for="d4">T</label></div>
            <div class="day-box"><input type="checkbox" id="d5" value="5" checked><label for="d5">F</label></div>
            <div class="day-box"><input type="checkbox" id="d6" value="6" checked><label for="d6">S</label></div>
        </div>

        <label style="font-size:0.7rem; color:var(--muted);">TASK NAME</label>
        <input type="text" id="manualInput" placeholder="Enter task..." style="width:100%; padding:14px; background:#000; border:2px solid #3a3a3c; color:#fff; border-radius:12px; margin-bottom:15px;">
        
        <label style="font-size:0.7rem; color:var(--muted);">QUICK SELECT</label>
        <div id="presets" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;"></div>

        <button class="btn-action" onclick="saveSlot()">SAVE TASK</button>
    </div>
</div>

<nav>
    <button class="nav-btn active" onclick="showPage('view', this)"><span>📅</span><br><small>DAILY</small></button>
    <button class="nav-btn" onclick="showPage('weekly', this)"><span>🗓️</span><br><small>WEEKLY</small></button>
    <button class="nav-btn" onclick="showPage('add', this)"><span>➕</span><br><small>ADD</small></button>
</nav>

<script>
    const EMOJIS = { "cook": "🍳", "clean": "🧹", "gym": "💪", "work": "💻", "read": "📚", "kid": "🧸", "pray": "🤲", "sleep": "😴", "bath": "🚿", "study": "🧠", "shop": "🛒", "walk": "🚶", "coffee": "☕" };
    const PRESETS = ["Cooking", "Cleaning", "Gym", "Office Work", "Reading", "Kid's Play", "Prayer", "Shower", "Meditation", "Grocery", "Walking", "Breakfast", "Lunch", "Dinner"];
    
    let slots = JSON.parse(localStorage.getItem('routine_slots')) || [];
    let selectedActivities = [];
    let editingId = null;

    function getEmoji(t) {
        t = t.toLowerCase();
        for (let key in EMOJIS) if (t.includes(key)) return EMOJIS[key];
        return "⭐";
    }

    // Convert 24h to 12h format
    function t12(t) {
        let [h, m] = t.split(':');
        h = parseInt(h);
        let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${m} ${ampm}`;
    }

    function init() {
        const p = document.getElementById('presets');
        PRESETS.forEach(pre => {
            let div = document.createElement('div');
            div.className = "day-box";
            div.innerHTML = `<div style="background:#2c2c2e; padding:8px; border-radius:8px; font-size:0.8rem; cursor:pointer;">${pre}</div>`;
            div.onclick = () => { document.getElementById('manualInput').value = pre; };
            p.appendChild(div);
        });
        renderSchedule();
        setInterval(updateClock, 1000);
    }

    function updateClock() {
        let now = new Date();
        let h = now.getHours();
        let m = now.getMinutes().toString().padStart(2, '0');
        let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        document.getElementById('clock').innerText = `${h}:${m} ${ampm}`;
        if (now.getSeconds() === 0) renderSchedule();
    }

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'weekly') renderWeeklyTable();
        if(id === 'view') renderSchedule();
    }

    function saveSlot() {
        const task = document.getElementById('manualInput').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const days = Array.from(document.querySelectorAll('.day-box input:checked')).map(i => parseInt(i.value));
        if(!task) return alert("Enter task name");

        const newSlot = { id: editingId || Date.now(), start, end, days, task };
        if (editingId) slots = slots.map(s => s.id === editingId ? newSlot : s);
        else slots.push(newSlot);

        slots.sort((a,b) => a.start.localeCompare(b.start));
        localStorage.setItem('routine_slots', JSON.stringify(slots));
        location.reload();
    }

    function renderSchedule() {
        const container = document.getElementById('slot-container');
        const today = new Date().getDay();
        const nowH = new Date().getHours();
        const nowM = new Date().getMinutes();
        const nowStr = `${nowH.toString().padStart(2, '0')}:${nowM.toString().padStart(2, '0')}`;
        
        container.innerHTML = '';
        const todaysSlots = slots.filter(s => s.days.includes(today));

        todaysSlots.forEach(s => {
            const isActive = nowStr >= s.start && nowStr < s.end;
            container.innerHTML += `
                <div class="slot ${isActive ? 'active-now' : ''}">
                    <div style="display:flex; justify-content:space-between;">
                        <span class="slot-time">${t12(s.start)} - ${t12(s.end)}</span>
                        <div>
                            <button onclick="editSlot(${s.id})" style="background:none; border:none; color:#fff;">✏️</button>
                            <button onclick="deleteSlot(${s.id})" style="background:none; border:none; color:var(--red);">🗑️</button>
                        </div>
                    </div>
                    <div class="tag-row">
                        <div class="big-tag">
                            <span style="font-size:2rem;">${getEmoji(s.task)}</span>
                            <span class="tag-text">${s.task}</span>
                        </div>
                    </div>
                </div>`;
        });
    }

    function renderWeeklyTable() {
        const body = document.getElementById('table-body');
        body.innerHTML = '';
        // Group by time
        const timeGroups = [...new Set(slots.map(s => s.start))].sort();
        
        timeGroups.forEach(time => {
            let row = `<tr><td>${t12(time)}</td>`;
            for(let i=0; i<7; i++) {
                const taskAtTime = slots.find(s => s.start === time && s.days.includes(i));
                row += `<td>${taskAtTime ? taskAtTime.task : ''}</td>`;
            }
            row += `</tr>`;
            body.innerHTML += row;
        });
    }

    function editSlot(id) {
        const s = slots.find(i => i.id === id);
        editingId = id;
        document.getElementById('startTime').value = s.start;
        document.getElementById('endTime').value = s.end;
        document.getElementById('manualInput').value = s.task;
        showPage('add', document.querySelectorAll('.nav-btn')[2]);
    }

    function deleteSlot(id) {
        if(confirm("Delete task?")) {
            slots = slots.filter(s => s.id !== id);
            localStorage.setItem('routine_slots', JSON.stringify(slots));
            renderSchedule();
        }
    }

    function exportPDF(elementId, fileName) {
        const element = document.getElementById(elementId);
        const opt = {
            margin: 0.5,
            filename: fileName + '.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: '#0f1117' },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    init();
</script>
</body>
</html>
