<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Routine Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #f0a500;
    --accent2: #e05c5c;
    --text: #e8eaf0;
    --muted: #7c82a0;
    --border: #2e3350;
    --success: #4caf7d;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  header span { font-size: 0.85rem; color: var(--muted); margin-left: 12px; }
  .header-right { display: flex; gap: 10px; }
  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--accent2); color: #fff; }

  /* MAIN LAYOUT */
  .main { display: grid; grid-template-columns: 340px 1fr; gap: 0; height: calc(100vh - 69px); }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 20px;
  }
  .sidebar h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--accent);
    margin-bottom: 16px;
    letter-spacing: 0.3px;
  }

  /* ADD SLOT FORM */
  .add-form {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .form-row label { font-size: 0.75rem; color: var(--muted); width: 44px; flex-shrink: 0; }
  .form-row input[type="time"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 7px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
  }
  .form-row input[type="time"]:focus { outline: none; border-color: var(--accent); }

  /* ACTIVITY CHIPS */
  .act-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }
  .act-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
    max-height: 160px; overflow-y: auto;
    padding: 2px;
  }
  .act-chip {
    padding: 5px 11px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .act-chip.selected {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
    font-weight: 600;
  }
  .act-chip:hover:not(.selected) { border-color: var(--accent); color: var(--text); }
  .add-btn {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-btn:hover { filter: brightness(1.1); }

  /* SLOTS LIST */
  .slots-list { display: flex; flex-direction: column; gap: 8px; }
  .slot-mini {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .slot-mini:hover { border-color: var(--accent); }
  .slot-mini.active { border-color: var(--accent); background: rgba(240,165,0,0.08); }
  .slot-mini .time { font-size: 0.78rem; color: var(--accent); font-weight: 600; }
  .slot-mini .acts { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .slot-mini .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; }
  .slot-mini .del-btn:hover { color: var(--accent2); }

  /* TIMETABLE */
  .timetable-area {
    overflow-y: auto;
    padding: 28px 32px;
    background: var(--bg);
  }
  .timetable-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .timetable-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--text);
  }
  .clock-display {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    background: var(--surface);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* TIMELINE */
  .timeline { position: relative; }
  .timeline-item {
    display: flex;
    gap: 0;
    margin-bottom: 6px;
    position: relative;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .time-col {
    width: 90px;
    flex-shrink: 0;
    padding: 14px 12px 14px 0;
    text-align: right;
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 500;
    position: relative;
  }
  .time-col::after {
    content: '';
    position: absolute;
    right: -1px; top: 0; bottom: 0;
    width: 2px;
    background: var(--border);
  }
  .timeline-item.current-slot .time-col::after { background: var(--accent); }

  .dot {
    position: absolute;
    right: -7px;
    top: 18px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--border);
    border: 2px solid var(--bg);
    z-index: 2;
  }
  .timeline-item.current-slot .dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

  .card-col { flex: 1; padding: 8px 0 8px 20px; }
  .slot-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .slot-card:hover { border-color: var(--accent); transform: translateX(2px); }
  .timeline-item.current-slot .slot-card {
    border-color: var(--accent);
    background: rgba(240,165,0,0.07);
    box-shadow: 0 4px 24px rgba(240,165,0,0.1);
  }

  .slot-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .slot-time-badge {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent);
    background: rgba(240,165,0,0.12);
    padding: 3px 9px;
    border-radius: 20px;
  }
  .current-badge {
    font-size: 0.68rem;
    background: var(--accent);
    color: #111;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .act-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .act-tag {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
    border: 1px solid;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }

  /* REMINDER POPUP */
  .popup-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }
  .popup-overlay.show { display: flex; }
  .popup {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 32px;
    max-width: 380px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(240,165,0,0.2);
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  .popup .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .popup h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent); margin-bottom: 6px; }
  .popup .time-text { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; }
  .popup .activities-list { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 20px; }
  .popup .act-tag { font-size: 0.78rem; padding: 6px 14px; }
  .popup-close { padding: 10px 28px; }

  /* NOTIFICATION BAR */
  .notif {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 400;
    max-width: 320px;
  }
  .notif.show { transform: translateY(0); opacity: 1; }
  .notif .n-icon { font-size: 1.4rem; }
  .notif .n-text h4 { font-size: 0.82rem; font-weight: 600; color: var(--text); }
  .notif .n-text p { font-size: 0.72rem; color: var(--muted); }

  /* EDIT MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    width: 400px;
    max-width: 94vw;
  }
  .modal h3 { font-family: 'Playfair Display', serif; color: var(--accent); margin-bottom: 20px; }
  .modal .form-row { flex-wrap: wrap; }
  .modal .form-row label { width: auto; font-size: 0.8rem; margin-bottom: 4px; }
  .modal .input-group { display: flex; flex-direction: column; flex: 1; gap: 4px; }
  .modal .act-grid { max-height: 180px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* ACTIVITY COLORS */
  .c0 { background: rgba(240,165,0,0.12); color: #f0a500; border-color: rgba(240,165,0,0.3); }
  .c1 { background: rgba(224,92,92,0.12); color: #e05c5c; border-color: rgba(224,92,92,0.3); }
  .c2 { background: rgba(76,175,125,0.12); color: #4caf7d; border-color: rgba(76,175,125,0.3); }
  .c3 { background: rgba(100,149,237,0.12); color: #6495ed; border-color: rgba(100,149,237,0.3); }
  .c4 { background: rgba(186,85,211,0.12); color: #ba55d3; border-color: rgba(186,85,211,0.3); }
  .c5 { background: rgba(255,160,122,0.12); color: #ffa07a; border-color: rgba(255,160,122,0.3); }
  .c6 { background: rgba(95,158,160,0.12); color: #5f9ea0; border-color: rgba(95,158,160,0.3); }
  .c7 { background: rgba(255,215,0,0.12); color: #ffd700; border-color: rgba(255,215,0,0.3); }
  .c8 { background: rgba(144,238,144,0.12); color: #90ee90; border-color: rgba(144,238,144,0.3); }
  .c9 { background: rgba(173,216,230,0.12); color: #add8e6; border-color: rgba(173,216,230,0.3); }
  .c10 { background: rgba(255,182,193,0.12); color: #ffb6c1; border-color: rgba(255,182,193,0.3); }
  .c11 { background: rgba(221,160,221,0.12); color: #dda0dd; border-color: rgba(221,160,221,0.3); }
</style>
</head>
<body>

<header>
  <div>
    <h1>🌙 Daily Routine Planner</h1>
    <span>Manage your day, one slot at a time</span>
  </div>
  <div class="header-right">
    <button class="btn btn-outline" onclick="clearAll()">Clear All</button>
    <button class="btn btn-primary" onclick="saveToFile()">💾 Save</button>
  </div>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>➕ Add Time Slot</h2>
    <div class="add-form">
      <div class="form-row">
        <label>From</label>
        <input type="time" id="startTime" value="06:00">
      </div>
      <div class="form-row">
        <label>To</label>
        <input type="time" id="endTime" value="06:30">
      </div>
      <div class="act-label" style="margin-top:8px; margin-bottom:8px;">Select Activities (multiple allowed)</div>
      <div class="act-grid" id="chipGrid"></div>
      <button class="add-btn" onclick="addSlot()">+ Add to Timetable</button>
    </div>

    <h2>📋 Scheduled Slots</h2>
    <div class="slots-list" id="slotsList"></div>
  </div>

  <!-- TIMETABLE -->
  <div class="timetable-area">
    <div class="timetable-header">
      <h2>Today's Timetable</h2>
      <div class="clock-display" id="clockDisplay">--:--:--</div>
    </div>
    <div class="timeline" id="timeline">
      <div class="empty-state">
        <div class="icon">📅</div>
        <h3>No slots yet</h3>
        <p>Add time slots from the left panel to build your timetable.</p>
      </div>
    </div>
  </div>
</div>

<!-- REMINDER POPUP -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup">
    <div class="icon">⏰</div>
    <h3>Time to Start!</h3>
    <div class="time-text" id="popupTime"></div>
    <div class="activities-list" id="popupActs"></div>
    <button class="btn btn-primary popup-close" onclick="closePopup()">Got it! ✓</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>✏️ Edit Slot</h3>
    <div class="form-row" style="flex-direction:column; gap:8px; margin-bottom:12px;">
      <div class="input-group">
        <label>From</label>
        <input type="time" id="editStart" style="background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 10px;font-family:'DM Sans',sans-serif;">
      </div>
      <div class="input-group">
        <label>To</label>
        <input type="time" id="editEnd" style="background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 10px;font-family:'DM Sans',sans-serif;">
      </div>
    </div>
    <div class="act-label">Activities</div>
    <div class="act-grid" id="editChipGrid"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- NOTIFICATION -->
<div class="notif" id="notifBar">
  <div class="n-icon">🔔</div>
  <div class="n-text">
    <h4 id="notifTitle"></h4>
    <p id="notifDesc"></p>
  </div>
</div>

<script>
const ACTIVITIES = [
  "MAKING DINNER","BABY BATHING","DINNER TIME","QUALITY TIME",
  "KITCHEN CLEANING","OTHER CLEANING","KID'S PLAY TIME","PRAYER TIME",
  "KID BED TIME","EXERCISE TIME","BATH TIME","BED TIME"
];

const ICONS = {
  "MAKING DINNER":"🍳","BABY BATHING":"🛁","DINNER TIME":"🍽️","QUALITY TIME":"💖",
  "KITCHEN CLEANING":"🧹","OTHER CLEANING":"🧽","KID'S PLAY TIME":"🧸","PRAYER TIME":"🤲",
  "KID BED TIME":"🌙","EXERCISE TIME":"💪","BATH TIME":"🚿","BED TIME":"😴"
};

let slots = JSON.parse(localStorage.getItem('dailySlots') || '[]');
let selectedActs = [];
let editIndex = -1;
let editSelected = [];
let remindedSlots = new Set();
let lastMinute = '';

// Init
buildChips('chipGrid', selectedActs, () => {});
buildChips('editChipGrid', editSelected, () => {});
renderAll();
startClock();
requestNotifPermission();

function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function buildChips(gridId, arr, onChange) {
  const g = document.getElementById(gridId);
  g.innerHTML = '';
  ACTIVITIES.forEach((act, i) => {
    const chip = document.createElement('div');
    chip.className = 'act-chip' + (arr.includes(act) ? ' selected' : '');
    chip.textContent = act;
    chip.onclick = () => {
      const idx = arr.indexOf(act);
      if (idx > -1) arr.splice(idx, 1); else arr.push(act);
      buildChips(gridId, arr, onChange);
      onChange();
    };
    g.appendChild(chip);
  });
}

function addSlot() {
  const s = document.getElementById('startTime').value;
  const e = document.getElementById('endTime').value;
  if (!s || !e) { showNotif('⚠️', 'Missing Time', 'Please set both start and end time'); return; }
  if (selectedActs.length === 0) { showNotif('⚠️', 'No Activity', 'Please select at least one activity'); return; }
  slots.push({ start: s, end: e, activities: [...selectedActs] });
  slots.sort((a, b) => a.start.localeCompare(b.start));
  selectedActs.length = 0;
  buildChips('chipGrid', selectedActs, () => {});
  save();
  renderAll();
  showNotif('✅', 'Slot Added', `${s}–${e}`);
}

function deleteSlot(i) {
  slots.splice(i, 1);
  save();
  renderAll();
}

function openEdit(i) {
  editIndex = i;
  const sl = slots[i];
  document.getElementById('editStart').value = sl.start;
  document.getElementById('editEnd').value = sl.end;
  editSelected.length = 0;
  sl.activities.forEach(a => editSelected.push(a));
  buildChips('editChipGrid', editSelected, () => {});
  document.getElementById('modalOverlay').classList.add('show');
}

function saveEdit() {
  const s = document.getElementById('editStart').value;
  const e = document.getElementById('editEnd').value;
  if (!s || !e || editSelected.length === 0) { showNotif('⚠️', 'Incomplete', 'Fill all fields'); return; }
  slots[editIndex] = { start: s, end: e, activities: [...editSelected] };
  slots.sort((a, b) => a.start.localeCompare(b.start));
  closeModal();
  save();
  renderAll();
  showNotif('✅', 'Slot Updated', `${s}–${e}`);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function renderAll() {
  renderTimeline();
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('slotsList');
  if (slots.length === 0) { list.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:12px;">No slots added yet.</div>'; return; }
  list.innerHTML = slots.map((sl, i) => `
    <div class="slot-mini" onclick="openEdit(${i})">
      <div>
        <div class="time">${fmt(sl.start)} – ${fmt(sl.end)}</div>
        <div class="acts">${sl.activities.slice(0,2).join(', ')}${sl.activities.length > 2 ? ` +${sl.activities.length-2}` : ''}</div>
      </div>
      <button class="del-btn" onclick="event.stopPropagation();deleteSlot(${i})">✕</button>
    </div>
  `).join('');
}

function renderTimeline() {
  const tl = document.getElementById('timeline');
  if (slots.length === 0) {
    tl.innerHTML = `<div class="empty-state"><div class="icon">📅</div><h3>No slots yet</h3><p>Add time slots from the left panel to build your timetable.</p></div>`;
    return;
  }
  const now = new Date();
  const nowStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  tl.innerHTML = slots.map((sl, i) => {
    const isCurrent = sl.start <= nowStr && nowStr < sl.end;
    return `
    <div class="timeline-item ${isCurrent ? 'current-slot' : ''}">
      <div class="time-col">
        ${fmt(sl.start)}<br><span style="font-size:0.65rem;opacity:0.6">${fmt(sl.end)}</span>
        <div class="dot"></div>
      </div>
      <div class="card-col">
        <div class="slot-card" onclick="openEdit(${i})">
          <div class="slot-card-header">
            <div class="slot-time-badge">${fmt(sl.start)} → ${fmt(sl.end)}</div>
            ${isCurrent ? '<div class="current-badge">NOW</div>' : ''}
          </div>
          <div class="act-tags">
            ${sl.activities.map((a, ai) => `
              <div class="act-tag c${ACTIVITIES.indexOf(a) % 12}">
                ${ICONS[a] || '•'} ${a}
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
    `;
  }).join('');
}

function fmt(t) {
  if (!t) return '';
  const [h, m] = t.split(':');
  const hh = parseInt(h);
  return `${hh > 12 ? hh-12 : hh === 0 ? 12 : hh}:${m} ${hh >= 12 ? 'PM' : 'AM'}`;
}

function startClock() {
  setInterval(() => {
    const now = new Date();
    document.getElementById('clockDisplay').textContent = now.toLocaleTimeString();
    const min = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    if (min !== lastMinute) {
      lastMinute = min;
      renderTimeline();
      checkReminders(min);
    }
  }, 1000);
}

function checkReminders(nowStr) {
  slots.forEach((sl, i) => {
    const key = sl.start + '-' + i;
    if (sl.start === nowStr && !remindedSlots.has(key)) {
      remindedSlots.add(key);
      triggerReminder(sl);
    }
  });
}

function triggerReminder(sl) {
  // Popup
  document.getElementById('popupTime').textContent = `${fmt(sl.start)} → ${fmt(sl.end)}`;
  const pa = document.getElementById('popupActs');
  pa.innerHTML = sl.activities.map(a => `<div class="act-tag c${ACTIVITIES.indexOf(a)%12}">${ICONS[a]||'•'} ${a}</div>`).join('');
  document.getElementById('popupOverlay').classList.add('show');

  // Browser notification
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('⏰ Time for: ' + sl.activities[0], {
      body: sl.activities.join(', ') + ` at ${fmt(sl.start)}`,
      icon: ''
    });
  }
}

function closePopup() { document.getElementById('popupOverlay').classList.remove('show'); }

function showNotif(icon, title, desc) {
  document.getElementById('notifTitle').textContent = title;
  document.getElementById('notifDesc').textContent = desc;
  document.querySelector('.notif .n-icon').textContent = icon;
  const nb = document.getElementById('notifBar');
  nb.classList.add('show');
  setTimeout(() => nb.classList.remove('show'), 3000);
}

function save() { localStorage.setItem('dailySlots', JSON.stringify(slots)); }

function saveToFile() {
  const data = JSON.stringify(slots, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'daily-routine.json';
  a.click();
  showNotif('💾', 'Saved!', 'Timetable saved as daily-routine.json');
}

function clearAll() {
  if (confirm('Clear all scheduled slots?')) {
    slots = [];
    remindedSlots.clear();
    save();
    renderAll();
    showNotif('🗑️', 'Cleared', 'All slots removed');
  }
}

// Load from file
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'o') {
    e.preventDefault();
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = evt => {
      const f = evt.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = re => {
        try {
          slots = JSON.parse(re.result);
          save(); renderAll();
          showNotif('📂', 'Loaded!', 'Timetable restored from file');
        } catch { showNotif('❌', 'Error', 'Invalid file format'); }
      };
      reader.readAsText(f);
    };
    input.click();
  }
});
</script>
</body>
</html>
