<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#05070a">
    <title>Routine Pro Max | Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --surface: #11131a; 
            --accent: #6366f1; /* Default Indigo */
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text: #f8fafc; --dim: #64748b; --border: rgba(255, 255, 255, 0.06);
            --success: #10b981; --pending: #f43f5e;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* SYSTEM & MOBILE RESETS */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; } /* Hide scrollbars for app feel */
        
        body { 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            -webkit-user-select: none; user-select: none; /* Prevent UI highlighting */
        }
        input { -webkit-user-select: text; user-select: text; }

        /* ONBOARDING */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .setup-input { appearance: none; background: var(--surface); border: 1px solid var(--border); padding: 18px; border-radius: 16px; color: white; width: 100%; text-align: center; font-size: 1.1rem; outline: none; margin-bottom: 20px; transition: 0.3s;}
        .setup-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* BANNER */
        #banner { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--accent); box-shadow: 0 10px 30px var(--accent-glow); padding: 15px 25px; border-radius: 100px; z-index: 10000; font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 10px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .banner-show { top: calc(var(--safe-top) + 10px) !important; }

        /* HEADER */
        header { padding: calc(var(--safe-top) + 15px) 25px 15px; display: flex; justify-content: space-between; align-items: center; }
        .clock { font-size: 1.8rem; font-weight: 300; letter-spacing: -1px; }

        /* CONTENT AREA */
        .content { flex: 1; overflow-y: auto; padding: 10px 20px calc(var(--safe-bottom) + 100px); scroll-behavior: smooth; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS & STATUS */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; transition: 0.3s; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-time { font-size: 0.75rem; font-weight: 700; color: var(--dim); }
        .card-name { font-size: 1.3rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -0.5px; }
        
        .status-badge { font-size: 0.6rem; font-weight: 800; padding: 4px 10px; border-radius: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .status-completed { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .status-pending { background: rgba(244, 63, 94, 0.1); color: var(--pending); border: 1px solid var(--pending); animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 transparent; } 50% { box-shadow: 0 0 10px rgba(244, 63, 94, 0.4); } }

        /* AURA ENGINE */
        @keyframes breathe { 0%, 100% { box-shadow: 0 0 10px var(--accent-glow); border-color: rgba(255,255,255,0.1); } 50% { box-shadow: 0 0 30px var(--accent-glow); border-color: var(--accent); } }
        .active-task { animation: breathe 3s infinite ease-in-out; background: linear-gradient(180deg, var(--surface) 0%, #171926 100%); border-width: 1.5px; }
        .active-task .card-time { color: var(--accent); }
        
        .aura-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: width 1s linear; }
        .particle { position: absolute; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); opacity: 0; pointer-events: none; }
        @keyframes float-particle { 0% { transform: translateY(0) scale(1); opacity: 0.8; } 100% { transform: translateY(-40px) scale(0); opacity: 0; } }

        /* BUTTONS & FORMS */
        button { touch-action: manipulation; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 800; width: 100%; cursor: pointer; box-shadow: 0 5px 15px var(--accent-glow); font-size: 1rem; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 10px 15px; border-radius: 12px; font-weight: 700; font-size: 0.75rem; cursor: pointer; }
        .btn-done { background: var(--success); color: #000; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 800; font-size: 0.75rem; cursor: pointer; }

        .time-split { display: flex; gap: 10px; margin-bottom: 20px; }
        .time-split input { flex: 1; appearance: none; background: var(--surface); border: 1px solid var(--border); padding: 15px; color: white; border-radius: 16px; outline: none; text-align: center; font-family: inherit; font-weight: 700;}
        
        /* DAY SELECTOR - AUTO ALL */
        .day-grid { display: flex; gap: 6px; margin-bottom: 20px; }
        .day-pill { flex: 1; padding: 12px 0; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; text-align: center; font-size: 0.75rem; font-weight: 800; color: var(--dim); cursor: pointer; transition: 0.2s; }
        .day-pill.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 10px var(--accent-glow); }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--border); }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--accent); }

        /* THEME & NAV */
        .theme-grid { display: flex; gap: 15px; margin-bottom: 30px; }
        .theme-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .theme-btn.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 20px var(--accent-glow); }

        nav { position: fixed; bottom: calc(var(--safe-bottom) + 10px); left: 20px; right: 20px; height: 75px; background: rgba(10, 12, 18, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { color: var(--dim); font-size: 0.65rem; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { color: var(--accent); transform: translateY(-2px); }
    </style>
</head>
<body>

<audio id="notify-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div id="banner"><span id="banner-icon">✨</span> <span id="banner-text">Time to focus!</span></div>

<div id="onboarding">
    <h1 style="font-weight: 800;">Establish Protocol</h1>
    <p style="color:var(--dim); margin-bottom: 30px;">Enter your designation.</p>
    <input type="text" id="name-input" class="setup-input" placeholder="Your Name">
    <button onclick="setupApp()" class="btn-action" style="max-width: 200px;">Initialize</button>
</div>

<header id="main-header" style="display:none">
    <div>
        <span id="current-day-label" style="font-size:0.65rem; font-weight:800; color:var(--accent); letter-spacing:1px; text-transform:uppercase;"></span>
        <h1 id="user-greeting" style="margin:0; font-size:1.5rem; font-weight:800;"></h1>
    </div>
    <div class="clock" id="live-clock"></div>
</header>

<div class="content" id="main-content" style="display:none;">
    <div id="page-list" class="page active"></div>

    <div id="page-add" class="page">
        <h2 id="form-title" style="margin-top:0;">New Ritual</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="task-name" class="setup-input" placeholder="Activity Title" style="text-align: left;">
        
        <div class="time-split">
            <div><div style="font-size:0.6rem; color:var(--dim); margin-bottom:5px; font-weight:800;">START</div><input type="time" id="task-start"></div>
            <div><div style="font-size:0.6rem; color:var(--dim); margin-bottom:5px; font-weight:800;">END</div><input type="time" id="task-end"></div>
        </div>

        <div style="font-size:0.6rem; color:var(--dim); margin-bottom:8px; font-weight:800; letter-spacing:1px;">ACTIVE DAYS</div>
        <div class="day-grid" id="day-selector">
            <div class="day-pill active" data-day="0">S</div>
            <div class="day-pill active" data-day="1">M</div>
            <div class="day-pill active" data-day="2">T</div>
            <div class="day-pill active" data-day="3">W</div>
            <div class="day-pill active" data-day="4">T</div>
            <div class="day-pill active" data-day="5">F</div>
            <div class="day-pill active" data-day="6">S</div>
        </div>

        <div class="toggle-row">
            <span style="font-size:0.8rem; font-weight:700;">Remind Me (Banner)</span>
            <input type="checkbox" id="task-remind" checked>
        </div>
        <div class="toggle-row" style="margin-bottom: 25px;">
            <span style="font-size:0.8rem; font-weight:700;">Play Sound</span>
            <input type="checkbox" id="task-sound" checked>
        </div>
        
        <button class="btn-action" onclick="saveRitual()">Deploy Ritual</button>
        <button id="del-btn" onclick="deleteRitual()" style="display:none; background:transparent; border:1px solid var(--border); color:var(--pending); margin-top:15px; width:100%; font-weight:800; padding:15px; border-radius:16px;">Delete Ritual</button>
    </div>

    <div id="page-settings" class="page">
        <h2 style="margin-top:0;">Environment</h2>
        <p style="font-size: 0.75rem; color:var(--dim); font-weight:700;">Aura Resonance</p>
        <div class="theme-grid">
            <div class="theme-btn active" style="background:#6366f1" onclick="applyTheme('#6366f1', this)"></div>
            <div class="theme-btn" style="background:#f59e0b" onclick="applyTheme('#f59e0b', this)"></div>
            <div class="theme-btn" style="background:#10b981" onclick="applyTheme('#10b981', this)"></div>
            <div class="theme-btn" style="background:#ec4899" onclick="applyTheme('#ec4899', this)"></div>
        </div>
        <button class="btn-outline" onclick="resetApp()" style="width:100%; color:var(--pending); border-color:rgba(244,63,94,0.2); padding:18px; border-radius:16px;">System Reset</button>
    </div>
</div>

<nav id="main-nav" style="display:none">
    <div class="nav-btn active" onclick="show('list')"><span>◈</span><span>ROUTINE</span></div>
    <div class="nav-btn" onclick="show('add')"><span>⊕</span><span>ADD</span></div>
    <div class="nav-btn" onclick="show('settings')"><span>⚙️</span><span>AURA</span></div>
</nav>

<script>
    let rituals = JSON.parse(localStorage.getItem('rituals_elite_v5')) || [];
    let userName = localStorage.getItem('user_name');
    let savedTheme = localStorage.getItem('aura_theme') || '#6366f1';
    let notifiedIds = [];

    // Haptic feedback helper for Android
    function haptic() { if(navigator.vibrate) navigator.vibrate(40); }

    function init() {
        applyTheme(savedTheme);
        if (!userName) document.getElementById('onboarding').style.display = 'flex';
        else launch();
        
        // Setup Day Pill click events
        document.querySelectorAll('.day-pill').forEach(p => {
            p.onclick = () => { haptic(); p.classList.toggle('active'); };
        });

        setInterval(tick, 1000);
        tick();
    }

    function applyTheme(color, el = null) {
        document.documentElement.style.setProperty('--accent', color);
        document.documentElement.style.setProperty('--accent-glow', color + '4d');
        localStorage.setItem('aura_theme', color);
        
        if(el) {
            haptic();
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        } else {
            document.querySelectorAll('.theme-btn').forEach(b => {
                if(b.style.backgroundColor === color || b.style.backgroundColor.replace(/ /g, '') === color) b.classList.add('active');
            });
        }
    }

    function setupApp() {
        haptic();
        const input = document.getElementById('name-input').value;
        if(input.length < 2) return;
        localStorage.setItem('user_name', input);
        userName = input;
        launch();
    }

    function launch() {
        document.getElementById('onboarding').style.display = 'none';
        ['main-header', 'main-content', 'main-nav'].forEach(id => document.getElementById(id).style.display = 'flex');
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('user-greeting').innerText = `Hello, ${userName}`;
        render();
    }

    function tick() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
        const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        document.getElementById('current-day-label').innerText = days[now.getDay()];
        render(); 
    }

    function format12(t) {
        let [h, m] = t.split(':');
        h = parseInt(h); let ampm = h >= 12 ? 'PM' : 'AM';
        return `${h % 12 || 12}:${m} ${ampm}`;
    }

    function showNotification(task) {
        if (notifiedIds.includes(task.id)) return;
        notifiedIds.push(task.id);
        
        document.getElementById('banner-text').innerText = `${task.name} is starting!`;
        document.getElementById('banner').classList.add('banner-show');
        if (task.sound) document.getElementById('notify-sound').play().catch(()=>{});
        
        setTimeout(() => { document.getElementById('banner').classList.remove('banner-show'); }, 5000);
    }

    function markDone(id) {
        haptic();
        const task = rituals.find(r => r.id === id);
        if(task) task.isDone = true;
        localStorage.setItem('rituals_elite_v5', JSON.stringify(rituals));
        render();
    }

    function createParticles(cardId, progressPerc) {
        if (progressPerc < 5 || Math.random() > 0.2) return; 
        const card = document.getElementById(`card-${cardId}`);
        if(!card) return;

        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 2;
        p.style.width = `${size}px`; p.style.height = `${size}px`;
        p.style.left = `calc(${progressPerc}% - 5px)`;
        p.style.bottom = '0px';
        p.style.animation = `float-particle ${Math.random() * 1.5 + 1}s forwards`;
        
        card.appendChild(p);
        setTimeout(() => { if(p.parentNode) p.parentNode.removeChild(p); }, 2500);
    }

    function render() {
        const list = document.getElementById('page-list');
        const now = new Date();
        const currentSecs = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
        const todayIdx = now.getDay();

        // Filter for today AND sort by time
        const sorted = rituals.filter(r => r.days && r.days.includes(todayIdx)).sort((a,b) => a.start.localeCompare(b.start));

        if(sorted.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding-top:60px; color:var(--dim); font-weight:700;">No rituals assigned for today.<br><br><span style="font-size:2rem;">☁️</span></div>`;
            return;
        }

        list.innerHTML = sorted.map(r => {
            const [sh, sm] = r.start.split(':').map(Number);
            const [eh, em] = r.end.split(':').map(Number);
            const startSecs = (sh * 3600) + (sm * 60);
            const endSecs = (eh * 3600) + (em * 60);
            
            const isFuture = currentSecs < startSecs;
            const isActive = currentSecs >= startSecs && currentSecs < endSecs;
            const isPast = currentSecs >= endSecs;

            let statusHTML = '';
            let opacity = 1;
            let actionBtn = `<button class="btn-outline" onclick="editRitual('${r.id}')">Manage</button>`;

            if (r.isDone) {
                statusHTML = `<span class="status-badge status-completed">COMPLETED</span>`;
                opacity = 0.5;
            } else if (isPast) {
                statusHTML = `<span class="status-badge status-pending">PENDING</span>`;
                actionBtn = `<button class="btn-done" onclick="markDone('${r.id}')">Mark Done</button> ` + actionBtn;
            } else if (isActive) {
                statusHTML = `<span class="status-badge" style="color:var(--accent); background:var(--accent-glow);">ACTIVE NOW</span>`;
                actionBtn = `<button class="btn-done" onclick="markDone('${r.id}')">Complete</button> ` + actionBtn;
                if(r.remind) showNotification(r);
            }

            let progressHTML = '';
            let countdownHTML = '';
            if (isActive && !r.isDone) {
                const totalDur = endSecs - startSecs;
                const passedDur = currentSecs - startSecs;
                const perc = (passedDur / totalDur) * 100;
                const secsLeft = totalDur - passedDur;
                
                const mLeft = Math.floor(secsLeft / 60);
                const sLeft = secsLeft % 60;
                countdownHTML = `<div style="font-size:0.75rem; font-weight:800; color:var(--text); margin-top:10px;">⏳ ${mLeft}m ${sLeft}s remaining</div>`;
                progressHTML = `<div class="aura-progress" style="width:${perc}%"></div>`;
                createParticles(r.id, perc);
            }

            return `
                <div class="card ${isActive && !r.isDone ? 'active-task' : ''}" id="card-${r.id}" style="opacity: ${opacity}">
                    <div class="card-header">
                        <span class="card-time">${format12(r.start)} — ${format12(r.end)}</span>
                        ${statusHTML}
                    </div>
                    <div class="card-name">${r.name}</div>
                    <div style="display:flex; gap:10px;">${actionBtn}</div>
                    ${countdownHTML}
                    ${progressHTML}
                </div>
            `;
        }).join('');
    }

    function show(p) {
        haptic();
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', ['list', 'add', 'settings'][i] === p));
        if(p !== 'add') resetForm();
        else {
            // Default to ALL days selected for new task
            if(!document.getElementById('edit-id').value) {
                document.querySelectorAll('.day-pill').forEach(pill => pill.classList.add('active'));
            }
        }
    }

    function saveRitual() {
        haptic();
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('task-name').value;
        const start = document.getElementById('task-start').value;
        const end = document.getElementById('task-end').value;
        const remind = document.getElementById('task-remind').checked;
        const sound = document.getElementById('task-sound').checked;
        
        // Extract selected days
        const days = Array.from(document.querySelectorAll('.day-pill'))
                          .filter(p => p.classList.contains('active'))
                          .map(p => parseInt(p.dataset.day));

        if(!name || !start || !end) return alert("Please fill all fields.");
        if(days.length === 0) return alert("Please select at least one day.");

        const data = { id: id || Date.now().toString(), name, start, end, remind, sound, days, isDone: false };

        if(id) rituals = rituals.map(r => r.id === id ? {...data, isDone: r.isDone} : r);
        else rituals.push(data);

        localStorage.setItem('rituals_elite_v5', JSON.stringify(rituals));
        resetForm();
        show('list');
        render();
    }

    function editRitual(id) {
        const r = rituals.find(x => x.id === id);
        show('add');
        document.getElementById('form-title').innerText = "Modify Ritual";
        document.getElementById('edit-id').value = r.id;
        document.getElementById('task-name').value = r.name;
        document.getElementById('task-start').value = r.start;
        document.getElementById('task-end').value = r.end;
        document.getElementById('task-remind').checked = r.remind;
        document.getElementById('task-sound').checked = r.sound;
        document.getElementById('del-btn').style.display = 'block';
        
        // Load assigned days
        document.querySelectorAll('.day-pill').forEach(p => {
            p.classList.toggle('active', r.days && r.days.includes(parseInt(p.dataset.day)));
        });
    }

    function deleteRitual() {
        haptic();
        const id = document.getElementById('edit-id').value;
        rituals = rituals.filter(r => r.id !== id);
        localStorage.setItem('rituals_elite_v5', JSON.stringify(rituals));
        show('list');
        render();
    }

    function resetForm() {
        document.getElementById('edit-id').value = '';
        document.getElementById('task-name').value = '';
        document.getElementById('task-start').value = '';
        document.getElementById('task-end').value = '';
        document.getElementById('del-btn').style.display = 'none';
        document.getElementById('form-title').innerText = "New Ritual";
        document.querySelectorAll('.day-pill').forEach(pill => pill.classList.add('active')); // Reset to all
    }

    function resetApp() {
        haptic();
        if(confirm("Erase all data and settings?")) { localStorage.clear(); location.reload(); }
    }

    init();
</script>
</body>
</html>
