<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Routine Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --surface: #12141c; 
            --accent: #6366f1; /* Default Indigo */
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text: #f8fafc; --dim: #94a3b8; --border: rgba(255, 255, 255, 0.08);
        }

        body, html { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100%; overflow: hidden; transition: 0.3s ease; }

        /* ONBOARDING */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .input-glass { background: var(--surface); border: 1px solid var(--border); padding: 18px; border-radius: 16px; color: white; width: 100%; font-size: 1rem; margin-bottom: 15px; outline: none; transition: 0.3s; }
        .input-glass:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* THEME ILLUMINATION */
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 15px var(--accent-glow); border-color: rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 35px var(--accent-glow); border-color: var(--accent); }
        }
        .active-task { animation: breathe 3s infinite ease-in-out; border-width: 1.5px !important; background: linear-gradient(145deg, var(--surface), #1a1d29); }

        /* HEADER */
        header { padding: 50px 25px 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .greet-box h1 { margin: 0; font-size: 1.6rem; font-weight: 800; }
        .clock-12 { font-size: 1.8rem; font-weight: 300; letter-spacing: -1px; }

        /* CONTENT */
        .content { height: calc(100vh - 180px); overflow-y: auto; padding: 0 20px 100px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 22px; margin-bottom: 16px; position: relative; }
        .card-time { font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; display: block; }
        
        /* THEME SELECTOR */
        .theme-swatch { width: 35px; height: 35px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .theme-swatch.active { border-color: white; transform: scale(1.1); }

        /* NAVIGATION */
        nav { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 75px; background: rgba(18, 20, 28, 0.85); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 28px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: var(--dim); font-size: 0.65rem; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        /* DAY PILLS */
        .day-row { display: flex; gap: 8px; margin: 15px 0 25px; }
        .day-pill { flex: 1; padding: 12px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; font-size: 0.7rem; font-weight: 800; text-align: center; color: var(--dim); cursor: pointer; }
        .day-pill.on { background: var(--accent); color: white; border-color: var(--accent); }

        /* BUTTONS */
        .btn-main { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 20px; font-weight: 800; width: 100%; font-size: 1rem; box-shadow: 0 10px 20px var(--accent-glow); margin-top: 10px; cursor: pointer; }
        .btn-edit { position: absolute; top: 20px; right: 20px; font-size: 0.65rem; color: var(--dim); font-weight: 700; border: 1px solid var(--border); padding: 5px 12px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="onboarding">
    <div style="font-size: 3rem; margin-bottom: 10px;">✨</div>
    <h1>Personalize</h1>
    <p style="color:var(--dim); margin-bottom: 30px;">Enter your name to begin your ritual</p>
    <input type="text" id="user-name-input" class="input-glass" placeholder="Your Name" style="text-align: center;">
    <button onclick="saveName()" class="btn-main">Get Started</button>
</div>

<header id="main-header" style="display:none">
    <div class="greet-box">
        <span id="day-name" style="font-size: 0.65rem; font-weight: 800; letter-spacing: 1.5px; color: var(--accent);">TUESDAY</span>
        <h1 id="greet-text">Hello, Alex</h1>
    </div>
    <div class="clock-12" id="clock">12:00 PM</div>
</header>

<div class="content" id="main-content" style="display:none">
    <div id="page-list"></div>

    <div id="page-add" style="display:none">
        <h2 id="form-title" style="font-weight: 800;">New Ritual</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="task-name" class="input-glass" placeholder="What's the plan?">
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><label style="font-size:0.6rem; color:var(--dim)">START</label><input type="time" id="task-start" class="input-glass"></div>
            <div style="flex:1"><label style="font-size:0.6rem; color:var(--dim)">END</label><input type="time" id="task-end" class="input-glass"></div>
        </div>
        <div class="day-row" id="day-picker">
            <div class="day-pill on">S</div><div class="day-pill on">M</div><div class="day-pill on">T</div>
            <div class="day-pill on">W</div><div class="day-pill on">T</div><div class="day-pill on">F</div>
            <div class="day-pill on">S</div>
        </div>
        <button onclick="saveTask()" class="btn-main" id="btn-save">Save Activity</button>
        <button onclick="deleteTask()" id="btn-delete" style="display:none; background:transparent; border:none; color:#ff453a; margin-top:20px; width:100%; font-weight:700;">Delete Ritual</button>
    </div>

    <div id="page-settings" style="display:none">
        <h2 style="font-weight: 800;">Environment</h2>
        <p style="font-size: 0.7rem; color:var(--dim); text-transform:uppercase;">Select Aura</p>
        <div style="display:flex; gap:15px; margin-bottom: 40px;">
            <div class="theme-swatch active" style="background:#6366f1" onclick="setTheme('#6366f1', this)"></div>
            <div class="theme-swatch" style="background:#007aff" onclick="setTheme('#007aff', this)"></div>
            <div class="theme-swatch" style="background:#f0a500" onclick="setTheme('#f0a500', this)"></div>
            <div class="theme-swatch" style="background:#34c759" onclick="setTheme('#34c759', this)"></div>
        </div>
    </div>
</div>

<nav id="main-nav" style="display:none">
    <div class="nav-item active" onclick="nav('list')"><span>📅</span><span>ROUTINE</span></div>
    <div class="nav-item" onclick="nav('add')"><span>⊕</span><span>NEW</span></div>
    <div class="nav-item" onclick="nav('settings')"><span>⚙️</span><span>AURA</span></div>
</nav>

<script>
    let tasks = JSON.parse(localStorage.getItem('pro_tasks')) || [];
    let userName = localStorage.getItem('user_name');

    function init() {
        if (!userName) document.getElementById('onboarding').style.display = 'flex';
        else launch();
        
        document.querySelectorAll('.day-pill').forEach(p => p.onclick = () => p.classList.toggle('on'));
        setInterval(tick, 1000);
        tick();
    }

    function saveName() {
        const val = document.getElementById('user-name-input').value;
        if(val.length < 2) return;
        localStorage.setItem('user_name', val);
        userName = val;
        launch();
    }

    function launch() {
        document.getElementById('onboarding').style.display = 'none';
        ['main-header', 'main-content', 'main-nav'].forEach(id => document.getElementById(id).style.display = 'flex');
        if(id === 'main-header') document.getElementById(id).style.display = 'flex'; // Fix for flex header
        document.getElementById('greet-text').innerText = `Hello, ${userName}`;
        render();
    }

    function tick() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
        document.getElementById('clock').innerText = timeStr;
        const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        document.getElementById('day-name').innerText = days[now.getDay()];
        if(now.getSeconds() === 0) render();
    }

    function setTheme(color, el) {
        document.documentElement.style.setProperty('--accent', color);
        document.documentElement.style.setProperty('--accent-glow', color + '4d');
        document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        localStorage.setItem('user_theme', color);
    }

    function render() {
        const list = document.getElementById('page-list');
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const today = now.getDay();

        const todays = tasks.filter(t => t.days.includes(today)).sort((a,b) => a.start.localeCompare(b.start));

        list.innerHTML = todays.map(t => {
            const [sh, sm] = t.start.split(':').map(Number);
            const [eh, em] = t.end.split(':').map(Number);
            const isActive = nowMin >= (sh*60+sm) && nowMin < (eh*60+em);
            
            // Format 12hr for display
            const fmt = (time) => {
                let [h, m] = time.split(':');
                h = parseInt(h);
                let suffix = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12;
                return `${h}:${m} ${suffix}`;
            };

            return `
                <div class="card ${isActive ? 'active-task' : ''}" style="opacity: ${nowMin > (eh*60+em) ? '0.4' : '1'}">
                    <span class="card-time">${fmt(t.start)} — ${fmt(t.end)}</span>
                    <div style="font-size:1.3rem; font-weight:800;">${t.name}</div>
                    <div class="btn-edit" onclick="editTask(${t.id})">Edit</div>
                </div>
            `;
        }).join('');
    }

    function nav(p) {
        ['page-list', 'page-add', 'page-settings'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('page-' + p).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', ['list', 'add', 'settings'][i] === p));
        
        if (p !== 'add') {
            document.getElementById('edit-id').value = '';
            document.getElementById('btn-delete').style.display = 'none';
            document.getElementById('form-title').innerText = "New Ritual";
        }
    }

    function saveTask() {
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('task-name').value;
        const start = document.getElementById('task-start').value;
        const end = document.getElementById('task-end').value;
        const days = Array.from(document.querySelectorAll('#day-picker .day-pill')).map((p, i) => p.classList.contains('on') ? i : null).filter(v => v !== null);

        if(!name || !start || !end) return;

        if (id) {
            const idx = tasks.findIndex(t => t.id == id);
            tasks[idx] = { id: Number(id), name, start, end, days };
        } else {
            tasks.push({ id: Date.now(), name, start, end, days });
        }

        localStorage.setItem('pro_tasks', JSON.stringify(tasks));
        document.getElementById('task-name').value = '';
        nav('list');
        render();
    }

    function editTask(id) {
        const t = tasks.find(x => x.id === id);
        nav('add');
        document.getElementById('form-title').innerText = "Edit Ritual";
        document.getElementById('edit-id').value = t.id;
        document.getElementById('task-name').value = t.name;
        document.getElementById('task-start').value = t.start;
        document.getElementById('task-end').value = t.end;
        document.getElementById('btn-delete').style.display = 'block';
        
        const pills = document.querySelectorAll('#day-picker .day-pill');
        pills.forEach((p, i) => p.classList.toggle('on', t.days.includes(i)));
    }

    function deleteTask() {
        const id = document.getElementById('edit-id').value;
        tasks = tasks.filter(t => t.id != id);
        localStorage.setItem('pro_tasks', JSON.stringify(tasks));
        nav('list');
        render();
    }

    init();
</script>
</body>
</html>
