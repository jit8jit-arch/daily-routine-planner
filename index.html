<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Routine Pro Max | Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --surface: #12141c;
            --accent: #6366f1; /* Modern Indigo */
            --accent-glow: rgba(99, 102, 241, 0.2);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HIGH-END UI COMPONENTS --- */
        header {
            padding: calc(var(--safe-top) + 25px) 25px 20px;
            background: linear-gradient(180deg, rgba(18,20,28,1) 0%, rgba(5,7,10,0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .brand-pill {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
            display: inline-block;
        }

        .clock-display {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: -1px;
        }

        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 0 20px 120px;
            scroll-behavior: smooth;
        }

        /* BENTO CARD STYLING */
        .card-bento {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .active-task {
            border-color: var(--accent);
            box-shadow: 0 20px 40px -10px var(--accent-glow);
            transform: scale(1.02);
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .time-tag {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .task-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* PROGRESS ENGINE V3 */
        .progress-container {
            margin-top: 20px;
        }

        .progress-track {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            width: 0%;
            transition: width 1s linear;
        }

        /* NAVIGATION BAR */
        nav {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            height: 75px;
            background: rgba(20, 22, 30, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.3s;
        }

        .nav-btn.active {
            color: var(--accent);
            transform: translateY(-2px);
        }

        .nav-btn small { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; }

        /* FORM STYLING */
        .input-field {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            color: white;
            width: 100%;
            font-size: 1rem;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .input-field:focus { border-color: var(--accent); background: #1a1d29; }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            width: 100%;
            font-size: 1rem;
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        .empty-state {
            text-align: center;
            margin-top: 100px;
            color: var(--text-dim);
        }

        /* ANIMATIONS */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
    </style>
</head>
<body>

<header>
    <div>
        <span class="brand-pill" id="current-day">Loading...</span>
        <div id="greet-name" style="font-weight: 800; font-size: 1.5rem;">Evening, Alex</div>
    </div>
    <div class="clock-display" id="clock">00:00</div>
</header>

<div class="content">
    <div id="page-schedule" class="page active">
        <div id="daily-list"></div>
    </div>

    <div id="page-add" class="page">
        <h2 style="margin-bottom: 30px; font-weight: 800;">Create Ritual</h2>
        <input type="text" id="task-name" class="input-field" placeholder="Activity Name (e.g. Deep Work)">
        <div style="display:flex; gap:12px;">
            <input type="time" id="task-start" class="input-field" value="09:00">
            <input type="time" id="task-end" class="input-field" value="10:00">
        </div>
        <p style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-left: 5px;">Active Days</p>
        <div id="day-selector" style="display: flex; gap: 8px; margin-bottom: 30px;">
            <button class="day-pill" onclick="this.classList.toggle('active')">S</button>
            </div>
        <button class="btn-primary" onclick="handleSave()">Initialize Activity</button>
    </div>
</div>

<nav>
    <button class="nav-btn active" onclick="switchNav('page-schedule', this)"><span>◈</span><small>Today</small></button>
    <button class="nav-btn" onclick="switchNav('page-add', this)"><span>⊕</span><small>Add</small></button>
    <button class="nav-btn"><span>◒</span><small>Stats</small></button>
</nav>

<script>
    let tasks = JSON.parse(localStorage.getItem('pro_tasks')) || [];
    
    function init() {
        updateTime();
        renderTasks();
        setInterval(updateTime, 1000);
    }

    function switchNav(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
    }

    function updateTime() {
        const now = new Date();
        const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        document.getElementById('current-day').innerText = days[now.getDay()];
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
        
        // Refresh UI state every minute
        if(now.getSeconds() === 0) renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('daily-list');
        const today = new Date().getDay();
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();

        const todaysTasks = tasks.sort((a,b) => a.start.localeCompare(b.start));

        if(todaysTasks.length === 0) {
            list.innerHTML = `<div class="empty-state">No rituals planned for today.<br><small>Tap ⊕ to begin</small></div>`;
            return;
        }

        list.innerHTML = todaysTasks.map(task => {
            const startArr = task.start.split(':');
            const endArr = task.end.split(':');
            const startMin = parseInt(startArr[0]) * 60 + parseInt(startArr[1]);
            const endMin = parseInt(endArr[0]) * 60 + parseInt(endArr[1]);
            
            const isActive = nowMin >= startMin && nowMin < endMin;
            const isPast = nowMin >= endMin;
            
            let progress = 0;
            if(isActive) progress = ((nowMin - startMin) / (endMin - startMin)) * 100;

            return `
                <div class="card-bento ${isActive ? 'active-task' : ''}" style="opacity: ${isPast ? '0.4' : '1'}">
                    <div class="task-meta">
                        <span class="time-tag">${task.start} — ${task.end}</span>
                        ${isActive ? '<span style="font-size:0.6rem; color:var(--accent); font-weight:800;">● IN PROGRESS</span>' : ''}
                    </div>
                    <h3 class="task-title">${task.name}</h3>
                    ${isActive ? `
                        <div class="progress-container">
                            <div class="progress-track"><div class="progress-fill" style="width: ${progress}%"></div></div>
                            <div style="display:flex; justify-content:space-between; margin-top:8px; font-size:0.65rem; color:var(--text-dim);">
                                <span>Starting energy</span>
                                <span>${Math.round(endMin - nowMin)}m remaining</span>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }).join('');
    }

    function handleSave() {
        const name = document.getElementById('task-name').value;
        const start = document.getElementById('task-start').value;
        const end = document.getElementById('task-end').value;

        if(!name) return;

        tasks.push({ id: Date.now(), name, start, end });
        localStorage.setItem('pro_tasks', JSON.stringify(tasks));
        
        document.getElementById('task-name').value = '';
        switchNav('page-schedule', document.querySelector('.nav-btn'));
        renderTasks();
    }

    init();
</script>
</body>
</html>
