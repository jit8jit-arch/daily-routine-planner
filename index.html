<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Routine Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --surface: #11131a; --accent: #6366f1; 
            --text: #f8fafc; --dim: #64748b; --border: rgba(255, 255, 255, 0.06);
            --accent-glow: rgba(99, 102, 241, 0.3);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ONBOARDING */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .setup-input { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 20px; color: white; width: 100%; max-width: 300px; font-size: 1.1rem; text-align: center; margin-bottom: 20px; outline: none; }
        .btn-start { background: var(--accent); color: white; border: none; padding: 18px 50px; border-radius: 100px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px var(--accent-glow); }

        /* HEADER */
        header { padding: calc(env(safe-area-inset-top) + 20px) 25px 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .greet h1 { margin: 0; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
        .greet span { color: var(--accent); font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .clock { font-size: 1.5rem; font-weight: 300; color: var(--text); }

        /* CONTENT */
        .content { flex: 1; overflow-y: auto; padding: 10px 20px 120px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* TASK CARDS & ANIMATION */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; position: relative; transition: 0.3s; }
        
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 10px var(--accent-glow); border-color: var(--border); }
            50% { box-shadow: 0 0 30px var(--accent-glow); border-color: var(--accent); }
        }
        .active-task { animation: breathe 3s infinite ease-in-out; border-width: 1px; background: linear-gradient(145deg, var(--surface), #1a1d26); }

        .card-time { font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; display: block; }
        .card-name { font-size: 1.2rem; font-weight: 700; }
        .btn-manage { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.05); border: none; color: var(--dim); padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; cursor: pointer; }

        /* INPUTS */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--dim); margin-bottom: 8px; letter-spacing: 1px; }
        .standard-input { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: 16px; color: white; font-size: 1rem; }
        
        /* DAY SELECTOR */
        .day-grid { display: flex; gap: 8px; margin-top: 10px; }
        .day-pill { flex: 1; padding: 12px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; text-align: center; font-size: 0.7rem; font-weight: 800; color: var(--dim); cursor: pointer; }
        .day-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* THEME SELECTOR */
        .theme-box { display: flex; gap: 15px; margin-top: 15px; }
        .theme-btn { width: 40px; height: 40px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; }
        .theme-btn.selected { border-color: white; transform: scale(1.1); }

        /* NAV */
        nav { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 75px; background: rgba(15, 17, 26, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-link { color: var(--dim); text-decoration: none; font-size: 0.65rem; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

<div id="onboarding">
    <div style="font-size: 3rem; margin-bottom: 10px;">👋</div>
    <h1>Welcome</h1>
    <p style="color:var(--dim); margin-bottom: 30px;">How should we address you?</p>
    <input type="text" id="user-name-input" class="setup-input" placeholder="Your Name">
    <button onclick="saveUser()" class="btn-start">Get Started</button>
</div>

<header id="app-header" style="display:none">
    <div class="greet">
        <span id="display-day">Tuesday</span>
        <h1 id="greet-name">Hello, User</h1>
    </div>
    <div class="clock" id="wall-clock">00:00</div>
</header>

<div class="content" id="app-content" style="display:none">
    <div id="page-list" class="page active"></div>

    <div id="page-add" class="page">
        <h2 id="form-title" style="margin-top:0">New Ritual</h2>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>ACTIVITY NAME</label>
            <input type="text" id="task-name" class="standard-input" placeholder="e.g. Deep Work">
        </div>
        <div style="display:flex; gap:15px;" class="form-group">
            <div style="flex:1">
                <label>START TIME</label>
                <input type="time" id="task-start" class="standard-input">
            </div>
            <div style="flex:1">
                <label>END TIME</label>
                <input type="time" id="task-end" class="standard-input">
            </div>
        </div>
        <div class="form-group">
            <label>REPEAT ON</label>
            <div class="day-grid" id="day-selector">
                <div class="day-pill active" onclick="toggleDay(this, 0)">S</div>
                <div class="day-pill active" onclick="toggleDay(this, 1)">M</div>
                <div class="day-pill active" onclick="toggleDay(this, 2)">T</div>
                <div class="day-pill active" onclick="toggleDay(this, 3)">W</div>
                <div class="day-pill active" onclick="toggleDay(this, 4)">T</div>
                <div class="day-pill active" onclick="toggleDay(this, 5)">F</div>
                <div class="day-pill active" onclick="toggleDay(this, 6)">S</div>
            </div>
        </div>
        <button class="btn-start" style="width:100%; border-radius:16px;" onclick="saveTask()">Save Ritual</button>
        <button id="del-btn" onclick="deleteTask()" style="display:none; width:100%; background:transparent; border:none; color:#ff453a; margin-top:20px; font-weight:700;">Delete Activity</button>
    </div>

    <div id="page-settings" class="page">
        <h2 style="margin-top:0">Environment</h2>
        <div class="form-group">
            <label>AURA THEME</label>
            <div class="theme-box">
                <div class="theme-btn selected" style="background:#6366f1" onclick="setTheme('#6366f1', this)"></div>
                <div class="theme-btn" style="background:#0ea5e9" onclick="setTheme('#0ea5e9', this)"></div>
                <div class="theme-btn" style="background:#f59e0b" onclick="setTheme('#f59e0b', this)"></div>
            </div>
        </div>
        <button onclick="resetApp()" style="margin-top:40px; background:none; border:none; color:var(--dim); font-size:0.7rem; text-decoration:underline;">Reset Application Data</button>
    </div>
</div>

<nav id="app-nav" style="display:none">
    <div class="nav-link active" onclick="showPage('list')"><span>📅</span><span>TODAY</span></div>
    <div class="nav-link" onclick="showPage('add')"><span>⊕</span><span>ADD</span></div>
    <div class="nav-link" onclick="showPage('settings')"><span>⚙️</span><span>AURA</span></div>
</nav>

<script>
    let rituals = JSON.parse(localStorage.getItem('rituals_v3')) || [];
    let userName = localStorage.getItem('user_name');
    let selectedDays = [0,1,2,3,4,5,6];

    function init() {
        if (!userName) {
            document.getElementById('onboarding').style.display = 'flex';
        } else {
            launchApp();
        }
        updateClock();
        setInterval(updateClock, 1000);
    }

    function saveUser() {
        const name = document.getElementById('user-name-input').value;
        if(name.length < 2) return;
        localStorage.setItem('user_name', name);
        userName = name;
        launchApp();
    }

    function launchApp() {
        document.getElementById('onboarding').style.display = 'none';
        document.getElementById('app-header').style.display = 'flex';
        document.getElementById('app-content').style.display = 'block';
        document.getElementById('app-nav').style.display = 'flex';
        document.getElementById('greet-name').innerText = `Hello, ${userName}`;
        renderList();
    }

    function updateClock() {
        const now = new Date();
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        document.getElementById('display-day').innerText = days[now.getDay()];
        document.getElementById('wall-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
        if(now.getSeconds() === 0) renderList();
    }

    function toggleDay(el, day) {
        el.classList.toggle('active');
        if(selectedDays.includes(day)) selectedDays = selectedDays.filter(d => d !== day);
        else selectedDays.push(day);
    }

    function setTheme(color, el) {
        document.documentElement.style.setProperty('--accent', color);
        document.documentElement.style.setProperty('--accent-glow', color + '4d');
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.querySelectorAll('.nav-link').forEach((l, i) => {
            l.classList.toggle('active', ['list', 'add', 'settings'][i] === p);
        });
        if(p !== 'add') {
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = "New Ritual";
            document.getElementById('del-btn').style.display = 'none';
        }
    }

    function format12(t) {
        let [h, m] = t.split(':');
        h = parseInt(h);
        let suffix = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${m} ${suffix}`;
    }

    function renderList() {
        const list = document.getElementById('page-list');
        const now = new Date();
        const currentMin = now.getHours() * 60 + now.getMinutes();
        const today = now.getDay();

        const todays = rituals.filter(r => r.days.includes(today)).sort((a,b) => a.start.localeCompare(b.start));

        if(todays.length === 0) {
            list.innerHTML = `<div style="text-align:center; margin-top:100px; color:var(--dim);">No rituals for today.</div>`;
            return;
        }

        list.innerHTML = todays.map(r => {
            const startParts = r.start.split(':').map(Number);
            const endParts = r.end.split(':').map(Number);
            const sMin = startParts[0] * 60 + startParts[1];
            const eMin = endParts[0] * 60 + endParts[1];
            const isActive = currentMin >= sMin && currentMin < eMin;

            return `
                <div class="card ${isActive ? 'active-task' : ''}" style="opacity: ${currentMin > eMin ? '0.4' : '1'}">
                    <span class="card-time">${format12(r.start)} — ${format12(r.end)}</span>
                    <div class="card-name">${r.name}</div>
                    <button class="btn-manage" onclick="prepEdit('${r.id}')">Manage</button>
                </div>
            `;
        }).join('');
    }

    function saveTask() {
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('task-name').value;
        const start = document.getElementById('task-start').value;
        const end = document.getElementById('task-end').value;

        if(!name || !start || !end) return;

        const ritualData = { id: id || Date.now().toString(), name, start, end, days: [...selectedDays] };

        if(id) {
            rituals = rituals.map(r => r.id === id ? ritualData : r);
        } else {
            rituals.push(ritualData);
        }

        localStorage.setItem('rituals_v3', JSON.stringify(rituals));
        resetForm();
        showPage('list');
        renderList();
    }

    function prepEdit(id) {
        const r = rituals.find(x => x.id === id);
        showPage('add');
        document.getElementById('form-title').innerText = "Edit Ritual";
        document.getElementById('edit-id').value = r.id;
        document.getElementById('task-name').value = r.name;
        document.getElementById('task-start').value = r.start;
        document.getElementById('task-end').value = r.end;
        document.getElementById('del-btn').style.display = 'block';
        selectedDays = r.days;
        document.querySelectorAll('.day-pill').forEach((p, i) => {
            p.classList.toggle('active', r.days.includes(i));
        });
    }

    function deleteTask() {
        const id = document.getElementById('edit-id').value;
        rituals = rituals.filter(r => r.id !== id);
        localStorage.setItem('rituals_v3', JSON.stringify(rituals));
        resetForm();
        showPage('list');
        renderList();
    }

    function resetForm() {
        document.getElementById('task-name').value = '';
        document.getElementById('task-start').value = '';
        document.getElementById('task-end').value = '';
        document.getElementById('edit-id').value = '';
    }

    function resetApp() {
        if(confirm("Wipe all data?")) {
            localStorage.clear();
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
