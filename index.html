<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1117">
    <title>Routine & Med Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f1117; --card: #1a1d27; --accent: #f0a500;
            --text: #ffffff; --muted: #94a3b8; --red: #ff453a;
            --blue: #007aff; --green: #34c759;
            --glass: rgba(255, 255, 255, 0.04); --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); 
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 2026 MOTION SYSTEM */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 25px rgba(240,165,0,0.3); } 100% { box-shadow: 0 0 5px var(--accent); } }
        @keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        header {
            padding: calc(var(--safe-top) + 20px) 20px 20px;
            background: linear-gradient(to bottom, var(--card), var(--bg));
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass);
        }
       .user-info h2 { margin: 0; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
       .user-info h1 { margin: 0; font-size: 1.4rem; font-weight: 900; }
       .clock-pro { background: var(--glass); padding: 8px 15px; border-radius: 12px; font-weight: 900; color: var(--accent); border: 1px solid rgba(240,165,0,0.2); }

       .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
       .page { display: none; animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
       .page.active { display: block; }

        /* MULTI-PURPOSE PRO CARDS */
       .card-pro { background: var(--card); border-radius: 28px; padding: 22px; margin-bottom: 20px; border: 1px solid var(--glass); position: relative; transition: 0.3s; }
       .card-active { border: 2.5px solid var(--accent); animation: glow 3s infinite; }
       .card-med { border-left: 5px solid var(--blue); }
        
       .time-tag { font-size: 0.85rem; font-weight: 800; color: var(--accent); margin-bottom: 10px; display: block; }
       .activity-main { display: flex; align-items: center; gap: 18px; }
       .activity-icon { font-size: 2.8rem; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.4)); }
       .activity-name { font-size: 2.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1.2px; line-height: 1; }
       .card-active.activity-name { animation: float 3s infinite ease-in-out; color: var(--accent); }

        /* MEDICINE UI ELEMENTS */
       .med-qty { font-size: 0.9rem; font-weight: 700; color: var(--blue); margin-top: 5px; }
       .med-actions { display: flex; gap: 10px; margin-top: 15px; }
       .btn-med { flex: 1; padding: 12px; border-radius: 14px; border: none; font-weight: 800; font-size: 0.8rem; cursor: pointer; }
       .btn-take { background: var(--green); color: #000; }
       .btn-later { background: var(--glass); color: #fff; }

        /* FORM INPUTS */
       .input-wrap { margin-bottom: 22px; }
        label { display: block; font-size: 0.7rem; font-weight: 900; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input, select { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1.5px solid var(--glass); 
            padding: 16px; border-radius: 16px; color: #fff; font-size: 1rem; font-weight: 700;
        }
        input:focus { border-color: var(--accent); }
       .day-selector { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0; }
       .day-chip { flex: 1; text-align: center; background: var(--glass); padding: 12px 0; border-radius: 12px; font-size: 0.75rem; font-weight: 900; }
       .day-chip.on { background: var(--accent); color: #000; box-shadow: 0 5px 15px rgba(240,165,0,0.2); }

        /* NAV ENGINE */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 95px;
            background: rgba(26, 29, 39, 0.95); backdrop-filter: blur(25px);
            border-top: 1px solid var(--glass); display: flex; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); z-index: 1000;
        }
       .nav-link { background: none; border: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; transition: 0.3s; }
       .nav-link.active { color: var(--accent); }
       .nav-link span { font-size: 1.6rem; margin-bottom: 5px; }
       .nav-link small { font-size: 0.6rem; font-weight: 900; text-transform: uppercase; }

        /* ACTIONS */
       .btn-gold { background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 20px; font-weight: 900; width: 100%; cursor: pointer; font-size: 1.1rem; }
       .btn-ghost { background: var(--glass); color: var(--red); border: 1px solid rgba(255,69,58,0.2); padding: 15px; border-radius: 15px; width: 100%; margin-top: 15px; font-weight: 800; }
    </style>
</head>
<body>

<header>
    <div class="user-info">
        <h2 id="header-day">Loading...</h2>
        <h1>HEALTH & ROUTINE</h1>
    </div>
    <div class="clock-pro" id="clock">00:00</div>
</header>

<div class="content">
    <div id="page-daily" class="page active">
        <div id="timeline-list"></div>
    </div>

    <div id="page-add" class="page">
        <div class="input-wrap">
            <label>Entry Type</label>
            <select id="entry-type" onchange="toggleFormFields()">
                <option value="routine">Routine Task</option>
                <option value="medicine">Medicine / Supplement</option>
            </select>
        </div>

        <div class="input-wrap">
            <label id="name-label">Task Name</label>
            <input type="text" id="entry-name" placeholder="e.g. Gym or Vitamin C">
        </div>

        <div id="med-fields" style="display:none;">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <div style="flex:1;"><label>Type</label>
                    <select id="med-unit">
                        <option value="Capsule(s)">Capsules</option>
                        <option value="ml">Drops (ml)</option>
                    </select>
                </div>
                <div style="flex:1;"><label>Quantity</label>
                    <input type="number" id="med-qty" value="1">
                </div>
            </div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div style="flex:1;"><label>Time</label><input type="time" id="entry-time" value="08:00"></div>
            <div id="end-time-wrap" style="flex:1;"><label>Ends (Optional)</label><input type="time" id="entry-end"></div>
        </div>

        <label>Repeat Weekly</label>
        <div class="day-selector" id="day-selector">
            <div class="day-chip on" onclick="this.classList.toggle('on')">S</div>
            <div class="day-chip on" onclick="this.classList.toggle('on')">M</div>
            <div class="day-chip on" onclick="this.classList.toggle('on')">T</div>
            <div class="day-chip on" onclick="this.classList.toggle('on')">W</div>
            <div class="day-chip on" onclick="this.classList.toggle('on')">T</div>
            <div class="day-chip on" onclick="this.classList.toggle('on')">F</div>
            <div class="day-chip on" onclick="this.classList.toggle('on')">S</div>
        </div>

        <button class="btn-gold" onclick="handleSave()" style="margin-top:20px;">SAVE TO TIMELINE</button>
    </div>

    <div id="page-more" class="page">
        <label>Weekly Overview</label>
        <div id="weekly-overview-area"></div>
        
        <label style="margin-top:25px;">Export & Data</label>
        <button class="btn-gold" style="background:#3a3a3c; color:#fff;" onclick="exportPDF('timeline-list', 'Daily_Health_Routine')">📄 SAVE DAILY AS PDF</button>
        <button class="btn-gold" style="background:#3a3a3c; color:#fff; margin-top:10px;" onclick="exportPDF('weekly-overview-area', 'Weekly_Medical_Schedule')">🗓️ SAVE WEEKLY AS PDF</button>
        
        <button class="btn-ghost" onclick="factoryReset()">🗑️ RESET ALL DATA</button>
    </div>
</div>

<nav>
    <button class="nav-link active" onclick="nav('page-daily', this)"><span>📅</span><small>Timeline</small></button>
    <button class="nav-link" onclick="nav('page-add', this)"><span>➕</span><small>Add</small></button>
    <button class="nav-link" onclick="nav('page-more', this)"><span>⚙️</span><small>Manage</small></button>
</nav>

<script>
    const EMOJIS = { "gym": "💪", "work": "💻", "cook": "🍳", "clean": "🧹", "read": "📚", "sleep": "😴", "pray": "🤲", "walk": "🚶", "coffee": "☕", "med": "💊", "drop": "💧" };
    let store = JSON.parse(localStorage.getItem('pro_health_v8')) |

| { entries:, medsTaken: {} };
    let editingId = null;

    function init() {
        updateClock();
        renderDaily();
        setInterval(updateClock, 1000);
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'page-daily') renderDaily();
        if(id === 'page-more') renderWeekly();
    }

    function toggleFormFields() {
        const type = document.getElementById('entry-type').value;
        document.getElementById('med-fields').style.display = type === 'medicine'? 'block' : 'none';
        document.getElementById('end-time-wrap').style.display = type === 'medicine'? 'none' : 'block';
        document.getElementById('name-label').innerText = type === 'medicine'? 'Medicine / Supplement' : 'Task Name';
    }

    function handleSave() {
        const type = document.getElementById('entry-type').value;
        const name = document.getElementById('entry-name').value;
        const start = document.getElementById('entry-time').value;
        const end = document.getElementById('entry-end').value |

| start;
        const medUnit = document.getElementById('med-unit').value;
        const medQty = document.getElementById('med-qty').value;
        const days =;
        document.querySelectorAll('.day-chip').forEach((c, i) => { if(c.classList.contains('on')) days.push(i); });

        if(!name) return alert("Please enter a name.");

        const entry = { id: editingId |

| Date.now(), type, name, start, end, days, medUnit, medQty };
        if(editingId) {
            store.entries = store.entries.map(e => e.id === editingId? entry : e);
        } else {
            store.entries.push(entry);
        }

        store.entries.sort((a,b) => a.start.localeCompare(b.start));
        saveStore();
        resetForm();
        nav('page-daily', document.querySelectorAll('.nav-link'));
    }

    function renderDaily() {
        const container = document.getElementById('timeline-list');
        const todayIdx = new Date().getDay();
        const dateKey = new Date().toISOString().split('T');
        const nowTotal = new Date().getHours() * 60 + new Date().getMinutes();
        
        container.innerHTML = `<h2 style="font-weight:900; margin-bottom:20px;">Today's Timeline</h2>`;
        const todaysEntries = store.entries.filter(e => e.days.includes(todayIdx));

        if(todaysEntries.length === 0) {
            container.innerHTML += `<p style="color:var(--muted)">No entries for today.</p>`;
            return;
        }

        todaysEntries.forEach(e => {
            const startM = toMins(e.start);
            const endM = toMins(e.end);
            const isActive = nowTotal >= startM && nowTotal < endM;
            const isTaken = store.medsTaken[dateKey]?.includes(e.id);
            
            const emoji = e.type === 'medicine'? (e.medUnit === 'ml'? '💧' : '💊') : getEmoji(e.name);
            
            container.innerHTML += `
                <div class="card-pro ${isActive? 'card-active' : ''} ${e.type === 'medicine'? 'card-med' : ''}">
                    <span class="time-tag">${fmt12(e.start)} ${e.type!== 'medicine'? '— ' + fmt12(e.end) : ''}</span>
                    <div class="activity-main">
                        <span class="activity-icon">${emoji}</span>
                        <div>
                            <div class="activity-name">${e.name}</div>
                            ${e.type === 'medicine'? `<div class="med-qty">${e.medQty} ${e.medUnit}</div>` : ''}
                        </div>
                    </div>
                    
                    ${e.type === 'medicine'? `
                        <div class="med-actions">
                            <button class="btn-med btn-take" onclick="markTaken(${e.id})">${isTaken? '✅ TAKEN' : 'TAKE NOW'}</button>
                            <button class="btn-med btn-later" onclick="alert('Reminder snoozed 15 mins')">LATER</button>
                        </div>
                    ` : ''}

                    <div style="position:absolute; top:20px; right:20px; display:flex; gap:10px;">
                        <button onclick="editEntry(${e.id})" style="background:none; border:none; color:var(--muted); font-size:1.1rem;">✏️</button>
                        <button onclick="deleteEntry(${e.id})" style="background:none; border:none; color:var(--red); font-size:1.1rem; opacity:0.6;">✕</button>
                    </div>
                </div>
            `;
        });
    }

    function renderWeekly() {
        const container = document.getElementById('weekly-overview-area');
        const dayNames =;
        container.innerHTML = '';
        dayNames.forEach((name, idx) => {
            const dayEntries = store.entries.filter(e => e.days.includes(idx));
            let html = `<div style="background:#000; border-radius:20px; padding:15px; margin-bottom:12px; border:1px solid var(--glass);">
                <div style="font-weight:900; color:var(--accent); margin-bottom:10px;">${name}</div>`;
            dayEntries.forEach(e => {
                html += `<div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px;">
                    <span>${fmt12(e.start)}</span> <b>${e.name}</b>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });
    }

    function markTaken(id) {
        const dateKey = new Date().toISOString().split('T');
        if(!store.medsTaken[dateKey]) store.medsTaken[dateKey] =;
        if(!store.medsTaken[dateKey].includes(id)) {
            store.medsTaken[dateKey].push(id);
            if('vibrate' in navigator) navigator.vibrate([50, 30, 50]); // Professional haptic [4, 5]
        }
        saveStore();
        renderDaily();
    }

    function deleteEntry(id) {
        if(!confirm("Remove from schedule?")) return;
        store.entries = store.entries.filter(e => e.id!== id);
        saveStore();
        renderDaily();
    }

    function editEntry(id) {
        const e = store.entries.find(item => item.id === id);
        editingId = id;
        document.getElementById('entry-type').value = e.type;
        document.getElementById('entry-name').value = e.name;
        document.getElementById('entry-time').value = e.start;
        document.getElementById('entry-end').value = e.end;
        document.getElementById('med-unit').value = e.medUnit |

| 'Capsule(s)';
        document.getElementById('med-qty').value = e.medQty |

| 1;
        document.querySelectorAll('.day-chip').forEach((c, i) => {
            c.classList.toggle('on', e.days.includes(i));
        });
        toggleFormFields();
        nav('page-add', document.querySelectorAll('.nav-link')[1]);
    }

    function resetForm() {
        editingId = null;
        document.getElementById('entry-name').value = '';
        document.querySelectorAll('.day-chip').forEach(c => c.classList.add('on'));
    }

    function saveStore() { localStorage.setItem('pro_health_v8', JSON.stringify(store)); }
    function toMins(t) { return parseInt(t.split(':')) * 60 + parseInt(t.split(':')[1]); }
    function fmt12(t) { let [h,m] = t.split(':'); h=parseInt(h); return `${h%12||12}:${m} ${h>=12?'PM':'AM'}`; }
    function getEmoji(t) { t=t.toLowerCase(); for(let k in EMOJIS) if(t.includes(k)) return EMOJIS[k]; return "⭐"; }

    function updateClock() {
        const now = new Date();
        const days =;
        document.getElementById('header-day').innerText = days;
        document.getElementById('clock').innerText = now.toLocaleTimeString(, {hour:'2-digit', minute:'2-digit'});
        if(now.getSeconds() === 0) renderDaily();
    }

    function exportPDF(id, name) {
        const opt = { margin:10, filename:name+'.pdf', html2canvas:{scale:2, backgroundColor:'#0f1117'}, jsPDF:{unit:'mm', format:'a4'} };
        html2pdf().set(opt).from(document.getElementById(id)).save();
    }

    function factoryReset() { if(confirm("Delete all?")) { localStorage.clear(); location.reload(); } }

    init();
</script>
</body>
</html>
