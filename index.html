<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1117">
    <title>Routine Pro Max</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f1117; --card: #1a1d27; --accent: #f0a500;
            --text: #ffffff; --muted: #a0a0ab; --red: #ff453a;
            --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            padding: calc(var(--safe-top) + 15px) 20px 15px;
            background: var(--card); border-bottom: 1px solid #2c2c2e;
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { margin: 0; font-size: 1.2rem; color: var(--accent); font-weight: 900; }
        .clock { font-weight: 800; font-size: 1rem; color: var(--accent); background: rgba(240,165,0,0.1); padding: 5px 12px; border-radius: 30px; }

        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* DAILY SLOTS - BIG HIGHLIGHTS */
        .slot { 
            background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 18px; 
            border: 1px solid #2c2c2e; position: relative; overflow: hidden;
        }
        .active-now { border: 3px solid var(--accent); animation: pulse 2s infinite; background: linear-gradient(145deg, #1e2230 0%, #12141d 100%); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.01); } }
        
        .slot-time-header { font-size: 1rem; font-weight: 800; color: var(--accent); margin-bottom: 15px; display: block; }
        .big-activity-name { 
            font-size: 2.2rem; font-weight: 900; text-transform: uppercase; 
            letter-spacing: -1px; line-height: 1; display: flex; align-items: center; gap: 15px;
        }
        .activity-icon { font-size: 2.5rem; }

        /* TIME INPUTS */
        .time-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .time-row div { flex: 1; }
        input[type="time"], input[type="text"] {
            width: 100%; background: #000; border: 2px solid #3a3a3c; color: #fff;
            padding: 15px; border-radius: 12px; font-size: 1rem; outline: none;
        }

        /* MOBILE WEEKLY CARDS */
        .weekly-day-card { background: #000; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #2c2c2e; }
        .day-title { color: var(--accent); font-weight: 900; font-size: 1.1rem; margin-bottom: 10px; border-bottom: 1px solid #2c2c2e; padding-bottom: 5px; }
        .mini-slot { font-size: 0.85rem; padding: 5px 0; border-bottom: 1px dotted #2c2c2e; display: flex; justify-content: space-between; }

        /* DAY SELECTOR */
        .day-grid { display: flex; justify-content: space-between; gap: 4px; margin-bottom: 20px; }
        .day-box { flex: 1; }
        .day-box input { display: none; }
        .day-box label { display: block; background: #2c2c2e; text-align: center; padding: 12px 0; border-radius: 8px; font-size: 0.75rem; font-weight: 700; }
        .day-box input:checked + label { background: var(--accent); color: #000; }

        /* NAV */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 80px; background: var(--card);
            border-top: 1px solid #2c2c2e; display: flex; justify-content: space-around; padding-bottom: 15px; z-index: 1000;
        }
        .nav-btn { background: none; border: none; color: var(--muted); flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn span { font-size: 1.4rem; }
        .nav-btn small { font-size: 0.65rem; font-weight: 800; margin-top: 2px; }

        .btn-main { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; width: 100%; font-size: 1.1rem; margin-top: 10px; }
        .btn-sec { background: #3a3a3c; color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <h1>ROUTINE PRO</h1>
    <div class="clock" id="clock">00:00 AM</div>
</header>

<div class="content">
    <div id="page-daily" class="page active">
        <div id="daily-container"></div>
    </div>

    <div id="page-add" class="page">
        <h2 style="font-weight:900;">Plan Activity</h2>
        <div class="time-row">
            <div><label><small>START</small></label><input type="time" id="startTime" value="06:00"></div>
            <div><label><small>END</small></label><input type="time" id="endTime" value="07:00"></div>
        </div>
        <label><small>REPEAT ON DAYS</small></label>
        <div class="day-grid">
            <div class="day-box"><input type="checkbox" id="d0" value="0" checked><label for="d0">S</label></div>
            <div class="day-box"><input type="checkbox" id="d1" value="1" checked><label for="d1">M</label></div>
            <div class="day-box"><input type="checkbox" id="d2" value="2" checked><label for="d2">T</label></div>
            <div class="day-box"><input type="checkbox" id="d3" value="3" checked><label for="d3">W</label></div>
            <div class="day-box"><input type="checkbox" id="d4" value="4" checked><label for="d4">T</label></div>
            <div class="day-box"><input type="checkbox" id="d5" value="5" checked><label for="d5">F</label></div>
            <div class="day-box"><input type="checkbox" id="d6" value="6" checked><label for="d6">S</label></div>
        </div>
        <input type="text" id="taskName" placeholder="Activity Name (e.g. Gym, Cooking)">
        <button class="btn-main" onclick="saveTask()">SAVE ACTIVITY</button>
    </div>

    <div id="page-more" class="page">
        <h2 style="font-weight:900;">Weekly Summary</h2>
        <div id="weekly-scroll-area"></div>
        
        <hr style="border:0; border-top:1px solid #2c2c2e; margin:25px 0;">
        
        <h2 style="font-weight:900;">Export Options</h2>
        <button class="btn-sec" onclick="exportPDF('daily-container', 'Daily_Schedule')">📄 Save Daily as PDF</button>
        <button class="btn-sec" onclick="exportPDF('weekly-scroll-area', 'Weekly_Schedule')">🗓️ Save Weekly as PDF</button>
        <button class="btn-sec" style="color:var(--red);" onclick="localStorage.clear(); location.reload();">🗑️ Clear All Data</button>
    </div>
</div>

<nav>
    <button class="nav-btn active" onclick="showPage('page-daily', this)"><span>📅</span><small>DAILY</small></button>
    <button class="nav-btn" onclick="showPage('page-add', this)"><span>➕</span><small>ADD</small></button>
    <button class="nav-btn" onclick="showPage('page-more', this)"><span>📊</span><small>WEEKLY/PDF</small></button>
</nav>

<script>
    const EMOJIS = { "cook": "🍳", "clean": "🧹", "gym": "💪", "work": "💻", "read": "📚", "kid": "🧸", "pray": "🤲", "sleep": "😴", "bath": "🚿", "walk": "🚶" };
    let tasks = JSON.parse(localStorage.getItem('pro_tasks')) || [];

    function getEmoji(t) {
        t = t.toLowerCase();
        for (let key in EMOJIS) if (t.includes(key)) return EMOJIS[key];
        return "⭐";
    }

    function t12(t) {
        let [h, m] = t.split(':');
        h = parseInt(h);
        let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${m} ${ampm}`;
    }

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'page-daily') renderDaily();
        if(id === 'page-more') renderWeekly();
    }

    function saveTask() {
        const name = document.getElementById('taskName').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const days = Array.from(document.querySelectorAll('.day-box input:checked')).map(i => parseInt(i.value));

        if(!name) return alert("Please enter an activity name");

        tasks.push({ id: Date.now(), name, start, end, days });
        tasks.sort((a,b) => a.start.localeCompare(b.start));
        localStorage.setItem('pro_tasks', JSON.stringify(tasks));
        
        document.getElementById('taskName').value = '';
        showPage('page-daily', document.querySelector('.nav-btn'));
    }

    function renderDaily() {
        const container = document.getElementById('daily-container');
        const today = new Date().getDay();
        const now = new Date().getHours() * 60 + new Date().getMinutes();
        
        container.innerHTML = '<h2 style="font-weight:900; margin-bottom:20px;">Today\'s Tasks</h2>';
        const todaysTasks = tasks.filter(t => t.days.includes(today));

        if(todaysTasks.length === 0) {
            container.innerHTML += '<p style="color:var(--muted);">No activities planned for today.</p>';
            return;
        }

        todaysTasks.forEach(t => {
            const startM = parseInt(t.start.split(':')[0]) * 60 + parseInt(t.start.split(':')[1]);
            const endM = parseInt(t.end.split(':')[0]) * 60 + parseInt(t.end.split(':')[1]);
            const isActive = now >= startM && now < endM;

            container.innerHTML += `
                <div class="slot ${isActive ? 'active-now' : ''}">
                    <span class="slot-time-header">${t12(t.start)} - ${t12(t.end)}</span>
                    <div class="big-activity-name">
                        <span class="activity-icon">${getEmoji(t.name)}</span>
                        <span>${t.name}</span>
                    </div>
                    <button onclick="deleteTask(${t.id})" style="position:absolute; top:20px; right:20px; background:none; border:none; color:var(--red); font-size:1.2rem;">🗑️</button>
                </div>`;
        });
    }

    function renderWeekly() {
        const container = document.getElementById('weekly-scroll-area');
        const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        container.innerHTML = '';

        dayNames.forEach((name, index) => {
            const dayTasks = tasks.filter(t => t.days.includes(index));
            let html = `<div class="weekly-day-card"><div class="day-title">${name}</div>`;
            if(dayTasks.length === 0) html += `<div style="color:var(--muted); font-size:0.8rem;">Rest Day</div>`;
            dayTasks.forEach(t => {
                html += `<div class="mini-slot"><span>${t12(t.start)}</span> <b>${t.name}</b></div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });
    }

    function deleteTask(id) {
        if(!confirm("Delete this activity?")) return;
        tasks = tasks.filter(t => t.id !== id);
        localStorage.setItem('pro_tasks', JSON.stringify(tasks));
        renderDaily();
    }

    function updateClock() {
        const now = new Date();
        let h = now.getHours();
        let m = now.getMinutes().toString().padStart(2, '0');
        let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        document.getElementById('clock').innerText = `${h}:${m} ${ampm}`;
        if(now.getSeconds() === 0) renderDaily();
    }

    function exportPDF(id, filename) {
        const element = document.getElementById(id);
        const opt = {
            margin: 10,
            filename: filename + '.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: '#0f1117' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    renderDaily();
    setInterval(updateClock, 1000);
</script>
</body>
</html>
