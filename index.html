<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1117">
    <title>Routine Pro Max</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f1117; --card: #1a1d27; --accent: #f0a500;
            --text: #ffffff; --muted: #94a3b8; --red: #ff453a;
            --glass: rgba(255, 255, 255, 0.03); --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); 
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* ANIMATIONS */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 20px rgba(240,165,0,0.3); } 100% { box-shadow: 0 0 5px var(--accent); } }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        header {
            padding: calc(var(--safe-top) + 20px) 20px 20px;
            background: linear-gradient(to bottom, var(--card), var(--bg));
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass);
        }
        .user-greet h2 { margin: 0; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .user-greet h1 { margin: 0; font-size: 1.3rem; font-weight: 800; }
        .clock-v2 { background: var(--glass); border: 1px solid rgba(240,165,0,0.2); padding: 8px 15px; border-radius: 12px; font-weight: 800; color: var(--accent); }

        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
        .page { display: none; animation: slideIn 0.3s ease-out; }
        .page.active { display: block; }

        /* PRO CARDS */
        .card-pro { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--glass); position: relative; }
        .active-card { border: 2px solid var(--accent); animation: pulse-glow 3s infinite; }
        
        .slot-time { font-size: 0.8rem; font-weight: 700; color: var(--accent); opacity: 0.8; margin-bottom: 8px; display: block; }
        .activity-row { display: flex; align-items: center; gap: 15px; }
        .activity-icon { font-size: 2.5rem; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        .activity-name { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        .active-card .activity-name { animation: float 3s infinite ease-in-out; }

        /* PROGRESS ENGINE */
        .prog-bar { width: 100%; height: 6px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); transition: width 1s linear; box-shadow: 0 0 10px var(--accent); }
        .time-rem { font-size: 0.7rem; color: var(--muted); margin-top: 8px; font-weight: 600; text-align: right; }

        /* INPUTS & SELECTORS */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
        input { 
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass); 
            padding: 15px; border-radius: 14px; color: #fff; font-size: 1rem; font-weight: 600;
        }
        .day-pill-container { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; }
        .day-pill { flex: 1; text-align: center; background: var(--glass); padding: 12px 0; border-radius: 12px; font-size: 0.75rem; font-weight: 800; }
        .day-pill.active { background: var(--accent); color: #000; }

        /* NAV V2 */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: rgba(26, 29, 39, 0.9); backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass); display: flex; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); z-index: 100;
        }
        .nav-item { background: none; border: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }
        .nav-item span { font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item small { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }

        /* BUTTONS */
        .btn-action { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 18px; font-weight: 800; width: 100%; cursor: pointer; }
        .btn-outline { background: var(--glass); color: #fff; border: 1px solid var(--glass); padding: 15px; border-radius: 14px; width: 100%; margin-top: 10px; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div class="user-greet">
        <h2 id="current-day">Tuesday</h2>
        <h1 id="greet-name">Hello, User</h1>
    </div>
    <div class="clock-v2" id="clock">00:00</div>
</header>

<div class="content">
    <div id="page-schedule" class="page active">
        <div id="daily-list"></div>
    </div>

    <div id="page-add" class="page">
        <div class="input-group">
            <label>What is the task?</label>
            <input type="text" id="task-name" placeholder="e.g. Morning Workout">
        </div>
        <div class="input-group" style="display:flex; gap:10px;">
            <div style="flex:1;"><label>From</label><input type="time" id="task-start" value="08:00"></div>
            <div style="flex:1;"><label>To</label><input type="time" id="task-end" value="09:00"></div>
        </div>
        <label>Repeat on</label>
        <div class="day-pill-container" id="day-selector">
            <div class="day-pill active" onclick="this.classList.toggle('active')">S</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">M</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">T</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">W</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">T</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">F</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">S</div>
        </div>
        <button class="btn-action" onclick="handleSave()">Save Activity</button>
    </div>

    <div id="page-settings" class="page">
        <label>User Profile</label>
        <div class="card-pro">
            <input type="text" id="pref-name" placeholder="Your Name" onchange="updateName(this.value)" style="margin-bottom:0; background:transparent; border:none; padding:0;">
        </div>
        
        <label>Data Management</label>
        <button class="btn-outline" onclick="exportPDF('daily-list', 'Daily_Routine')">📄 Export Schedule PDF</button>
        <button class="btn-outline" onclick="downloadJSON()">💾 Backup Data (JSON)</button>
        
        <label style="margin-top:20px;">Personalization</label>
        <div style="display:flex; gap:10px;">
            <button class="btn-outline" style="border-color:#f0a500" onclick="setTheme('#f0a500')">Gold</button>
            <button class="btn-outline" style="border-color:#34c759" onclick="setTheme('#34c759')">Green</button>
            <button class="btn-outline" style="border-color:#007aff" onclick="setTheme('#007aff')">Blue</button>
        </div>

        <button class="btn-outline" style="color:var(--red); border-color:rgba(255,69,58,0.2); margin-top:30px;" onclick="factoryReset()">🗑 Reset All App Data</button>
    </div>
</div>

<nav>
    <button class="nav-item active" onclick="nav('page-schedule', this)"><span>📅</span><small>Routine</small></button>
    <button class="nav-item" onclick="nav('page-add', this)"><span>➕</span><small>Add</small></button>
    <button class="nav-item" onclick="nav('page-settings', this)"><span>⚙️</span><small>Settings</small></button>
</nav>

<script>
    const EMOJIS = { "gym": "💪", "work": "💻", "cook": "🍳", "clean": "🧹", "read": "📚", "sleep": "😴", "pray": "🤲", "bath": "🚿", "walk": "🚶", "coffee": "☕" };
    let tasks = JSON.parse(localStorage.getItem('pro_max_tasks')) || [];
    let userName = localStorage.getItem('pro_user_name') || 'User';

    function init() {
        document.getElementById('pref-name').value = userName;
        document.getElementById('greet-name').innerText = `Hello, ${userName}`;
        updateClock();
        renderDaily();
        setInterval(updateClock, 1000);
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function updateName(val) {
        userName = val || 'User';
        localStorage.setItem('pro_user_name', userName);
        document.getElementById('greet-name').innerText = `Hello, ${userName}`;
    }

    function setTheme(color) {
        document.documentElement.style.setProperty('--accent', color);
        localStorage.setItem('pro_theme', color);
    }

    function handleSave() {
        const name = document.getElementById('task-name').value;
        const start = document.getElementById('task-start').value;
        const end = document.getElementById('task-end').value;
        const pills = document.querySelectorAll('.day-pill');
        const days = [];
        pills.forEach((p, i) => { if(p.classList.contains('active')) days.push(i); });

        if(!name) return;
        tasks.push({ id: Date.now(), name, start, end, days });
        tasks.sort((a,b) => a.start.localeCompare(b.start));
        localStorage.setItem('pro_max_tasks', JSON.stringify(tasks));
        
        document.getElementById('task-name').value = '';
        renderDaily();
        nav('page-schedule', document.querySelectorAll('.nav-item')[0]);
    }

    function renderDaily() {
        const container = document.getElementById('daily-list');
        const today = new Date().getDay();
        const now = new Date();
        const nowTotal = now.getHours() * 60 + now.getMinutes();
        
        container.innerHTML = '';
        const todaysTasks = tasks.filter(t => t.days.includes(today));

        todaysTasks.forEach(t => {
            const startM = parseInt(t.start.split(':')[0]) * 60 + parseInt(t.start.split(':')[1]);
            const endM = parseInt(t.end.split(':')[0]) * 60 + parseInt(t.end.split(':')[1]);
            const isActive = nowTotal >= startM && nowTotal < endM;
            
            let progress = 0, remText = '';
            if(isActive) {
                progress = ((nowTotal - startM) / (endM - startM)) * 100;
                remText = `${endM - nowTotal} mins remaining`;
            }

            const emoji = getEmoji(t.name);
            container.innerHTML += `
                <div class="card-pro ${isActive ? 'active-card' : ''}">
                    <span class="slot-time">${fmt12(t.start)} — ${fmt12(t.end)}</span>
                    <div class="activity-row">
                        <span class="activity-icon">${emoji}</span>
                        <span class="activity-name">${t.name}</span>
                    </div>
                    ${isActive ? `
                        <div class="prog-bar"><div class="prog-fill" style="width:${progress}%"></div></div>
                        <div class="time-rem">${remText}</div>
                    ` : ''}
                    <button onclick="deleteTask(${t.id})" style="position:absolute; top:20px; right:20px; background:none; border:none; color:var(--red); opacity:0.5;">✕</button>
                </div>
            `;
        });
    }

    function getEmoji(t) {
        t = t.toLowerCase();
        for (let k in EMOJIS) if(t.includes(k)) return EMOJIS[k];
        return "⭐";
    }

    function fmt12(t) {
        let [h, m] = t.split(':');
        h = parseInt(h);
        return `${h % 12 || 12}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        localStorage.setItem('pro_max_tasks', JSON.stringify(tasks));
        renderDaily();
    }

    function updateClock() {
        const now = new Date();
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        document.getElementById('current-day').innerText = days[now.getDay()];
        document.getElementById('clock').innerText = now.toTimeString().slice(0, 5);
        if(now.getSeconds() === 0) renderDaily();
    }

    function exportPDF(id, name) {
        const opt = { margin:10, filename:name+'.pdf', html2canvas:{scale:2, backgroundColor:'#0f1117'}, jsPDF:{unit:'mm', format:'a4'} };
        html2pdf().set(opt).from(document.getElementById(id)).save();
    }

    function downloadJSON() {
        const data = JSON.stringify({tasks, userName, theme: localStorage.getItem('pro_theme')});
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'routine_backup.json';
        a.click();
    }

    function factoryReset() {
        if(confirm("DANGER: This will delete ALL tasks and settings. Continue?")) {
            localStorage.clear();
            location.reload();
        }
    }

    init();
    if(localStorage.getItem('pro_theme')) setTheme(localStorage.getItem('pro_theme'));
</script>
</body>
</html>
