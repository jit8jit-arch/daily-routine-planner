<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>Daily Routine Planner</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surf:#1a1d27; --surf2:#22263a;
  --acc:#f0a500; --red:#e05c5c; --text:#e8eaf0;
  --muted:#7c82a0; --bdr:#2e3350; --r:14px;
  --hdr:58px; --nav:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}

header{height:var(--hdr);flex-shrink:0;background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:relative;z-index:50;}
.hdr-left h1{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--acc)}
.clock{font-size:0.78rem;font-weight:600;color:var(--acc);background:rgba(240,165,0,.12);padding:4px 10px;border-radius:20px;border:1px solid rgba(240,165,0,.25)}
.hbtn{padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:600;}
.hbtn-out{background:transparent;border:1px solid var(--bdr);color:var(--text)}

.tab-bar{height:var(--nav);flex-shrink:0;background:var(--surf);border-top:1px solid var(--bdr);display:flex;order:99;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.65rem;font-weight:500;}
.tab-btn.active{color:var(--acc)}

.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.page{display:none;flex:1;overflow-y:auto;padding:16px}
.page.active{display:flex;flex-direction:column}

.sec-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--acc);margin-bottom:14px}
.card{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:16px}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.time-group{display:flex;flex-direction:column;gap:5px}
.time-group label{font-size:0.7rem;color:var(--muted);text-transform:uppercase}
.time-group input{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--text);padding:10px;width:100%}

/* NEW DAY SELECTOR */
.day-selector {display:flex; justify-content:space-between; margin-bottom:15px; gap:4px}
.day-check {flex:1; text-align:center;}
.day-check input {display:none;}
.day-check label {display:block; padding:8px 0; background:var(--bg); border:1px solid var(--bdr); border-radius:6px; font-size:0.7rem; color:var(--muted); cursor:pointer;}
.day-check input:checked + label {background:var(--acc); color:#111; border-color:var(--acc); font-weight:700;}

.chip-grid{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg);color:var(--muted);font-size:0.72rem;}
.chip.sel{background:var(--acc);color:#111;font-weight:600}

.add-btn{width:100%;margin-top:14px;padding:13px;background:var(--acc);color:#111;border:none;border-radius:10px;font-weight:700;}

.slot-item{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.slot-item.current{border:2px solid var(--acc); background:rgba(240,165,0,.05)}
.slot-header{display:flex;justify-content:space-between;margin-bottom:10px}
.slot-time{font-size:0.82rem;font-weight:600;color:var(--acc)}
.tag-row{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:4px 10px;border-radius:20px;font-size:0.7rem;border:1px solid;display:flex;align-items:center;gap:5px}
.tag .tdel {cursor:pointer; opacity:0.5}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surf);border:1px solid var(--acc);padding:10px 20px;border-radius:10px;opacity:0;transition:0.3s;z-index:300;}
.toast.show{opacity:1}

/* COLORS */
.c0{background:rgba(240,165,0,.1);color:#f0a500;border-color:#f0a500}
.c1{background:rgba(224,92,92,.1);color:#e05c5c;border-color:#e05c5c}
.c2{background:rgba(76,175,125,.1);color:#4caf7d;border-color:#4caf7d}
</style>
</head>
<body>

<header>
  <div class="hdr-left"><h1>🌙 Routine</h1></div>
  <div class="clock" id="clock">--:--</div>
  <button class="hbtn hbtn-out" onclick="switchTab(document.querySelector('[data-page=pg-save]'),'pg-save')">💾 Save</button>
</header>

<div class="content">
  <div class="page active" id="pg-view">
    <div class="sec-title">📅 Today's Timetable</div>
    <div id="slotsList"></div>
  </div>

  <div class="page" id="pg-add">
    <div class="sec-title">➕ Add Time Slot</div>
    <div class="card">
      <div class="time-row">
        <div class="time-group"><label>From</label><input type="time" id="startTime" value="06:00"></div>
        <div class="time-group"><label>To</label><input type="time" id="endTime" value="06:30"></div>
      </div>

      <div style="font-size:0.7rem; color:var(--muted); margin-bottom:8px; text-transform:uppercase;">Repeat on Days:</div>
      <div class="day-selector" id="daySelector">
        <div class="day-check"><input type="checkbox" id="d0" value="0" checked><label for="d0">Sun</label></div>
        <div class="day-check"><input type="checkbox" id="d1" value="1" checked><label for="d1">Mon</label></div>
        <div class="day-check"><input type="checkbox" id="d2" value="2" checked><label for="d2">Tue</label></div>
        <div class="day-check"><input type="checkbox" id="d3" value="3" checked><label for="d3">Wed</label></div>
        <div class="day-check"><input type="checkbox" id="d4" value="4" checked><label for="d4">Thu</label></div>
        <div class="day-check"><input type="checkbox" id="d5" value="5" checked><label for="d5">Fri</label></div>
        <div class="day-check"><input type="checkbox" id="d6" value="6" checked><label for="d6">Sat</label></div>
      </div>

      <div class="chip-grid" id="cg1"></div>
      <button class="add-btn" onclick="addSlot()">+ Add to Timetable</button>
    </div>
  </div>

  <div class="page" id="pg-save">
    <div class="sec-title">💾 Settings</div>
    <div class="card" onclick="clearAll()" style="border-color:var(--red); color:var(--red); text-align:center;">🗑 Clear All Data</div>
  </div>
</div>

<nav class="tab-bar">
  <button class="tab-btn active" data-page="pg-view" onclick="switchTab(this,'pg-view')"><span>📅</span>View</button>
  <button class="tab-btn" data-page="pg-add" onclick="switchTab(this,'pg-add')"><span>➕</span>Add</button>
  <button class="tab-btn" data-page="pg-save" onclick="switchTab(this,'pg-save')"><span>⚙️</span>Settings</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const PRESETS=["MAKING DINNER","BABY BATHING","DINNER TIME","QUALITY TIME","EXERCISE","BATH TIME","BED TIME"];
let slots = JSON.parse(localStorage.getItem('rp_slots') || '[]');
let selectedActs = [];

function switchTab(btn, pid) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(pid).classList.add('active');
  if(pid === 'pg-view') renderView();
}

function buildChips() {
  const g = document.getElementById('cg1'); g.innerHTML = '';
  PRESETS.forEach(act => {
    const sel = selectedActs.includes(act);
    const d = document.createElement('div');
    d.className = 'chip' + (sel ? ' sel' : '');
    d.textContent = act;
    d.onclick = () => {
      if(sel) selectedActs = selectedActs.filter(a=>a!==act);
      else selectedActs.push(act);
      buildChips();
    };
    g.appendChild(d);
  });
}

function addSlot() {
  const s = document.getElementById('startTime').value;
  const e = document.getElementById('endTime').value;
  const days = Array.from(document.querySelectorAll('.day-check input:checked')).map(i=>parseInt(i.value));

  if(!selectedActs.length) return toast("Select an activity");
  
  slots.push({ start: s, end: e, activities: [...selectedActs], days: days });
  slots.sort((a,b) => a.start.localeCompare(b.start));
  
  localStorage.setItem('rp_slots', JSON.stringify(slots));
  selectedActs = [];
  buildChips();
  toast("✅ Slot Added!");
  switchTab(document.querySelector('[data-page=pg-view]'), 'pg-view');
}

function renderView() {
  const el = document.getElementById('slotsList');
  const today = new Date().getDay();
  const now = new Date();
  const ns = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');

  // Filter slots to only show those that apply to "today"
  const todaysSlots = slots.filter(s => s.days.includes(today));

  if(!todaysSlots.length) {
    el.innerHTML = '<div style="text-align:center; padding:40px; color:var(--muted)">No tasks for today.</div>';
    return;
  }

  el.innerHTML = todaysSlots.map((sl, i) => {
    const cur = sl.start <= ns && ns < sl.end;
    return `
      <div class="slot-item ${cur ? 'current' : ''}">
        <div class="slot-header">
          <div class="slot-time">${sl.start} - ${sl.end}</div>
          <button onclick="deleteSlot(${i})" style="background:none; border:none; color:var(--red)">🗑</button>
        </div>
        <div class="tag-row">
          ${sl.activities.map(a => `<div class="tag c${a.length%3}">${a}</div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function deleteSlot(i) {
  slots.splice(i, 1);
  localStorage.setItem('rp_slots', JSON.stringify(slots));
  renderView();
}

function clearAll() {
  if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); }
}

function toast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function startClock() {
  setInterval(() => {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if(now.getSeconds() === 0) renderView();
  }, 1000);
}

buildChips();
renderView();
startClock();
</script>
</body>
</html>
