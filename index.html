<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1117">
    <title>Routine Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117; --card: #1a1d27; --accent: #f0a500;
            --text: #ffffff; --muted: #8e8e93; --red: #ff453a;
            --green: #34c759; --glass: rgba(255, 255, 255, 0.05);
            --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* ANIMATIONS */
        @keyframes pulse-glow { 0% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 20px var(--accent); } 100% { box-shadow: 0 0 5px var(--accent); } }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }

        header {
            padding: calc(var(--safe-top) + 15px) 20px 15px;
            background: var(--card); border-bottom: 1px solid #2c2c2e;
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { margin: 0; font-size: 1.2rem; color: var(--accent); font-weight: 800; }
        .clock { font-weight: 700; font-size: 1rem; color: var(--accent); background: rgba(240,165,0,0.1); padding: 4px 12px; border-radius: 20px; }

        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 16px; border: 1px solid #2c2c2e; }
        label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; font-weight: 700; letter-spacing: 0.5px; }
        
        input[type="time"], input[type="text"] {
            width: 100%; background: #000; border: 1px solid #3a3a3c; color: #fff;
            padding: 14px; border-radius: 12px; font-size: 1rem; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        /* MANUAL ENTRY ROW */
        .manual-entry { display: flex; gap: 8px; margin-bottom: 20px; }
        .manual-entry input { margin-bottom: 0; }
        .add-btn-small { background: var(--accent); border: none; padding: 0 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .day-grid { display: flex; justify-content: space-between; gap: 6px; margin-bottom: 20px; }
        .day-box { flex: 1; }
        .day-box input { display: none; }
        .day-box label { 
            display: block; background: #2c2c2e; text-align: center; padding: 12px 0;
            border-radius: 10px; font-size: 0.75rem; color: #fff; transition: 0.3s; margin: 0;
        }
        .day-box input:checked + label { background: var(--accent); color: #000; font-weight: 800; transform: scale(1.05); }

        .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .chip { 
            padding: 10px 18px; background: #2c2c2e; border-radius: 25px; font-size: 0.85rem; 
            border: 1px solid transparent; transition: 0.2s; cursor: pointer;
        }
        .chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(240,165,0,0.15); font-weight: 600; }

        /* ACTIVE SLOT HIGHLIGHT */
        .slot { 
            background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px;
            border: 1px solid #2c2c2e; transition: 0.4s; position: relative; overflow: hidden;
        }
        .slot.active-now { 
            border: 2px solid var(--accent); 
            animation: pulse-glow 3s infinite ease-in-out;
            background: linear-gradient(135deg, #1a1d27 0%, #252a3a 100%);
        }
        .slot.active-now::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(240,165,0,0.1), transparent);
            animation: shimmer 2s infinite;
        }
        .status-badge {
            display: inline-block; background: var(--accent); color: #000;
            font-size: 0.6rem; font-weight: 900; padding: 3px 8px; border-radius: 6px;
            margin-bottom: 10px; animation: float 2s infinite ease-in-out;
        }

        .slot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .slot-time { font-weight: 800; font-size: 1rem; color: var(--accent); }
        .tag-row { display: flex; flex-wrap: wrap; gap: 8px; position: relative; z-index: 2; }
        .tag { background: rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; }

        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: rgba(26, 29, 39, 0.95); backdrop-filter: blur(15px);
            border-top: 1px solid #2c2c2e; display: flex; justify-content: space-around; padding-bottom: 15px;
        }
        .nav-btn { background: none; border: none; color: var(--muted); padding-top: 10px; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); transform: translateY(-5px); }
        .btn-primary { 
            width: 100%; background: var(--accent); color: #000; border: none; 
            padding: 16px; border-radius: 14px; font-weight: 800; font-size: 1rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Routine Pro</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<div class="content">
    <div id="view" class="page active">
        <label id="today-label">Today's Timeline</label>
        <div id="slot-container"></div>
    </div>

    <div id="add" class="page">
        <h2 id="form-title" style="font-size: 1.3rem; font-weight: 800; margin-bottom: 20px;">Plan Activity</h2>
        
        <div class="card">
            <div style="display: flex; gap: 12px;">
                <div style="flex: 1;"><label>Start</label><input type="time" id="startTime" value="06:00"></div>
                <div style="flex: 1;"><label>End</label><input type="time" id="endTime" value="07:00"></div>
            </div>

            <label>Days of the Week</label>
            <div class="day-grid">
                <div class="day-box"><input type="checkbox" id="d0" value="0" checked><label for="d0">S</label></div>
                <div class="day-box"><input type="checkbox" id="d1" value="1" checked><label for="d1">M</label></div>
                <div class="day-box"><input type="checkbox" id="d2" value="2" checked><label for="d2">T</label></div>
                <div class="day-box"><input type="checkbox" id="d3" value="3" checked><label for="d3">W</label></div>
                <div class="day-box"><input type="checkbox" id="d4" value="4" checked><label for="d4">T</label></div>
                <div class="day-box"><input type="checkbox" id="d5" value="5" checked><label for="d5">F</label></div>
                <div class="day-box"><input type="checkbox" id="d6" value="6" checked><label for="d6">S</label></div>
            </div>

            <label>Manual Activity Entry</label>
            <div class="manual-entry">
                <input type="text" id="manualInput" placeholder="Type custom activity...">
                <button class="add-btn-small" onclick="addManualActivity()">+</button>
            </div>

            <label>Quick Select</label>
            <div class="chip-grid" id="preset-chips"></div>

            <button class="btn-primary" onclick="saveSlot()">Save Routine</button>
            <button id="cancel-edit" style="display:none; width:100%; background:none; color:var(--muted); border:none; margin-top:15px; font-weight:600;" onclick="resetForm()">Cancel Editing</button>
        </div>
    </div>
</div>

<nav>
    <button class="nav-btn active" onclick="showPage('view', this)"><span>📅</span><br><small>VIEW</small></button>
    <button class="nav-btn" onclick="showPage('add', this)"><span>➕</span><br><small>ADD</small></button>
</nav>

<script>
    let PRESETS = ["Cooking", "Cleaning", "Exercise", "Work", "Reading", "Kid's Time"];
    let slots = JSON.parse(localStorage.getItem('routine_slots')) || [];
    let selectedActivities = [];
    let editingId = null;

    function init() {
        renderChips();
        renderSchedule();
        updateClock();
        setInterval(updateClock, 1000);
    }

    function renderChips() {
        const container = document.getElementById('preset-chips');
        container.innerHTML = '';
        PRESETS.forEach(p => {
            const div = document.createElement('div');
            div.className = `chip ${selectedActivities.includes(p) ? 'selected' : ''}`;
            div.innerText = p;
            div.onclick = () => {
                if(selectedActivities.includes(p)) selectedActivities = selectedActivities.filter(a => a !== p);
                else selectedActivities.push(p);
                renderChips();
            };
            container.appendChild(div);
        });
    }

    function addManualActivity() {
        const val = document.getElementById('manualInput').value.trim();
        if(val && !PRESETS.includes(val)) {
            PRESETS.push(val);
            selectedActivities.push(val);
            document.getElementById('manualInput').value = '';
            renderChips();
        }
    }

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
        if(pageId === 'view') renderSchedule();
    }

    function saveSlot() {
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const days = Array.from(document.querySelectorAll('.day-box input:checked')).map(i => parseInt(i.value));

        if (!selectedActivities.length) return alert("Please select or type an activity");

        const newSlot = {
            id: editingId || Date.now(),
            start, end, days,
            activities: [...selectedActivities]
        };

        if (editingId) slots = slots.map(s => s.id === editingId ? newSlot : s);
        else slots.push(newSlot);

        slots.sort((a, b) => a.start.localeCompare(b.start));
        localStorage.setItem('routine_slots', JSON.stringify(slots));
        resetForm();
        showPage('view', document.querySelector('.nav-btn'));
    }

    function renderSchedule() {
        const container = document.getElementById('slot-container');
        const today = new Date().getDay();
        const nowStr = new Date().toTimeString().slice(0,5);
        container.innerHTML = '';
        
        const todaysSlots = slots.filter(s => s.days.includes(today));

        todaysSlots.forEach(s => {
            const isActive = nowStr >= s.start && nowStr < s.end;
            const div = document.createElement('div');
            div.className = `slot ${isActive ? 'active-now' : ''}`;
            div.innerHTML = `
                ${isActive ? '<div class="status-badge">CURRENTLY ACTIVE</div>' : ''}
                <div class="slot-header">
                    <div class="slot-time">${s.start} - ${s.end}</div>
                    <div class="slot-actions">
                        <button onclick="editSlot(${s.id})">✏️</button>
                        <button onclick="deleteSlot(${s.id})">🗑️</button>
                    </div>
                </div>
                <div class="tag-row">${s.activities.map(a => `<div class="tag">${a}</div>`).join('')}</div>
            `;
            container.appendChild(div);
        });
    }

    function editSlot(id) {
        const s = slots.find(i => i.id === id);
        editingId = id;
        document.getElementById('startTime').value = s.start;
        document.getElementById('endTime').value = s.end;
        selectedActivities = [...s.activities];
        document.querySelectorAll('.day-box input').forEach(input => {
            input.checked = s.days.includes(parseInt(input.value));
        });
        renderChips();
        document.getElementById('form-title').innerText = "Edit Schedule";
        document.getElementById('cancel-edit').style.display = 'block';
        showPage('add', document.querySelectorAll('.nav-btn')[1]);
    }

    function deleteSlot(id) {
        if(confirm("Delete this?")) {
            slots = slots.filter(s => s.id !== id);
            localStorage.setItem('routine_slots', JSON.stringify(slots));
            renderSchedule();
        }
    }

    function resetForm() {
        editingId = null;
        selectedActivities = [];
        document.getElementById('form-title').innerText = "Plan Activity";
        document.getElementById('cancel-edit').style.display = 'none';
        document.querySelectorAll('.day-box input').forEach(i => i.checked = true);
        renderChips();
    }

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toTimeString().slice(0, 5);
        if(new Date().getSeconds() === 0) renderSchedule();
    }

    init();
</script>
</body>
</html>
