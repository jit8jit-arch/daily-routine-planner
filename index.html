<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Routine Pro Max | Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --surface: #11131a; --accent: #6366f1; 
            --text: #f8fafc; --dim: #64748b; --border: rgba(255, 255, 255, 0.06);
            --accent-glow: rgba(99, 102, 241, 0.3);
        }

        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ONBOARDING SYSTEM */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; transition: 0.5s ease; }
        .setup-input { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 20px; color: white; width: 100%; max-width: 300px; font-size: 1.1rem; text-align: center; margin-bottom: 20px; outline: none; }

        /* HEADER */
        header { padding: calc(env(safe-area-inset-top) + 20px) 25px 15px; display: flex; justify-content: space-between; align-items: center; }
        .clock { font-size: 1.8rem; font-weight: 300; letter-spacing: -1px; }

        /* TIME SELECTION - THE "ELITE" FORMAT */
        .time-picker-container {
            display: flex; align-items: center; justify-content: space-around;
            background: rgba(255,255,255,0.03); border-radius: 30px; padding: 25px 10px;
            border: 1px solid var(--border); margin: 20px 0;
        }
        .time-box { text-align: center; flex: 1; }
        .time-label { font-size: 0.6rem; font-weight: 800; color: var(--dim); letter-spacing: 1px; margin-bottom: 10px; display: block; }
        
        /* Modern Native-Style Time Input */
        .pro-time-input {
            background: transparent; border: none; color: var(--accent);
            font-size: 1.4rem; font-weight: 800; font-family: inherit;
            text-align: center; width: 100%; outline: none; cursor: pointer;
        }

        .duration-indicator {
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid var(--border); position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .duration-indicator::after {
            content: '→'; color: var(--dim); font-size: 1.2rem;
        }

        /* ILLUMINATION CARDS */
        @keyframes breathe {
            0% { box-shadow: 0 0 10px var(--accent-glow), 0 0 5px rgba(255,255,255,0.02); }
            50% { box-shadow: 0 0 25px var(--accent-glow), 0 0 10px var(--accent-glow); border-color: var(--accent); }
            100% { box-shadow: 0 0 10px var(--accent-glow), 0 0 5px rgba(255,255,255,0.02); }
        }
        .active-task { animation: breathe 4s infinite ease-in-out; background: #161924; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 24px; margin-bottom: 15px; position: relative; }
        .card-time { font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-bottom: 5px; display: block; }
        .card-name { font-size: 1.3rem; font-weight: 800; }

        /* DAY SELECTOR */
        .day-grid { display: flex; gap: 6px; margin-top: 15px; }
        .day-pill { flex: 1; padding: 14px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; text-align: center; font-size: 0.65rem; font-weight: 800; color: var(--dim); cursor: pointer; transition: 0.3s; }
        .day-pill.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 5px 15px var(--accent-glow); }

        /* NAV */
        nav { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 80px; background: rgba(10, 12, 18, 0.9); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { color: var(--dim); font-size: 0.65rem; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }

        .btn-action { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 20px; font-weight: 800; width: 100%; font-size: 1rem; cursor: pointer; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-manage { position: absolute; top: 24px; right: 24px; background: rgba(255,255,255,0.05); color: var(--dim); border: none; padding: 6px 14px; border-radius: 10px; font-size: 0.6rem; font-weight: 800; }
    </style>
</head>
<body>

<div id="onboarding">
    <h1 style="font-weight: 800;">Identify Yourself</h1>
    <p style="color:var(--dim); margin-bottom: 30px;">This name will be your focus anchor.</p>
    <input type="text" id="name-input" class="setup-input" placeholder="Enter Name">
    <button onclick="setupApp()" class="btn-action" style="max-width: 200px;">Begin</button>
</div>

<header id="main-header" style="display:none">
    <div>
        <span id="current-day-label" style="font-size:0.65rem; font-weight:800; color:var(--accent); letter-spacing:1.5px;">TUESDAY</span>
        <h1 id="user-greeting" style="margin:0; font-size:1.5rem; font-weight:800;">Hello</h1>
    </div>
    <div class="clock" id="live-clock">12:00 PM</div>
</header>

<div class="content" id="main-content" style="display:none; padding-bottom: 150px;">
    <div id="page-list" style="display:block"></div>

    <div id="page-add" style="display:none">
        <h2 id="form-title" style="margin-top:0; font-weight:800;">New Ritual</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="task-name" class="setup-input" placeholder="Activity Title" style="max-width: 100%; text-align: left;">
        
        <div class="time-picker-container">
            <div class="time-box">
                <span class="time-label">START</span>
                <input type="time" id="task-start" class="pro-time-input">
            </div>
            <div class="duration-indicator"></div>
            <div class="time-box">
                <span class="time-label">END</span>
                <input type="time" id="task-end" class="pro-time-input">
            </div>
        </div>

        <div class="day-grid">
            <div class="day-pill active" onclick="this.classList.toggle('active')">S</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">M</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">T</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">W</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">T</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">F</div>
            <div class="day-pill active" onclick="this.classList.toggle('active')">S</div>
        </div>
        
        <button class="btn-action" onclick="saveRitual()" style="margin-top: 30px;">Save Ritual</button>
        <button id="del-btn" onclick="deleteRitual()" style="display:none; background:transparent; border:none; color:#ff453a; margin-top:20px; width:100%; font-weight:800;">Delete Ritual</button>
    </div>
</div>

<nav id="main-nav" style="display:none">
    <div class="nav-btn active" onclick="show('list')"><span>📅</span><span>TODAY</span></div>
    <div class="nav-btn" onclick="show('add')"><span>⊕</span><span>ADD</span></div>
    <div class="nav-btn" onclick="resetApp()"><span>🗑</span><span>RESET</span></div>
</nav>

<script>
    let rituals = JSON.parse(localStorage.getItem('rituals_elite')) || [];
    let userName = localStorage.getItem('user_name');

    function init() {
        if (!userName) document.getElementById('onboarding').style.display = 'flex';
        else launch();
        
        updateClock();
        setInterval(updateClock, 1000);
    }

    function setupApp() {
        const input = document.getElementById('name-input').value;
        if(input.length < 2) return;
        localStorage.setItem('user_name', input);
        userName = input;
        launch();
    }

    function launch() {
        document.getElementById('onboarding').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('user-greeting').innerText = `Hello, ${userName}`;
            render();
        }, 500);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
        const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        document.getElementById('current-day-label').innerText = days[now.getDay()];
        if(now.getSeconds() === 0) render();
    }

    function render() {
        const list = document.getElementById('page-list');
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const todayIdx = now.getDay();
        
        const todaysRituals = rituals.filter(r => r.days.includes(todayIdx)).sort((a,b) => a.start.localeCompare(b.start));

        list.innerHTML = todaysRituals.map(r => {
            const [sh, sm] = r.start.split(':').map(Number);
            const [eh, em] = r.end.split(':').map(Number);
            const sMin = sh * 60 + sm;
            const eMin = eh * 60 + em;
            const isActive = nowMin >= sMin && nowMin < eMin;

            const format12 = (t) => {
                let [h, m] = t.split(':');
                h = parseInt(h);
                let ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12;
                return `${h}:${m} ${ampm}`;
            };

            return `
                <div class="card ${isActive ? 'active-task' : ''}" style="opacity: ${nowMin > eMin ? '0.3' : '1'}">
                    <span class="card-time">${format12(r.start)} — ${format12(r.end)}</span>
                    <div class="card-name">${r.name}</div>
                    <button class="btn-manage" onclick="editRitual('${r.id}')">Manage</button>
                    ${isActive ? '<div style="margin-top:10px; font-size:0.6rem; font-weight:800; color:var(--accent);">● ACTIVE NOW</div>' : ''}
                </div>
            `;
        }).join('');
    }

    function show(p) {
        document.getElementById('page-list').style.display = p === 'list' ? 'block' : 'none';
        document.getElementById('page-add').style.display = p === 'add' ? 'block' : 'none';
        document.querySelectorAll('.nav-btn').forEach((b, i) => {
            b.classList.toggle('active', (i === 0 && p === 'list') || (i === 1 && p === 'add'));
        });
        if(p !== 'add') resetForm();
    }

    function saveRitual() {
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('task-name').value;
        const start = document.getElementById('task-start').value;
        const end = document.getElementById('task-end').value;
        const days = Array.from(document.querySelectorAll('.day-pill')).map((p, i) => p.classList.contains('active') ? i : null).filter(x => x !== null);

        if(!name || !start || !end) return;

        const data = { id: id || Date.now().toString(), name, start, end, days };

        if(id) rituals = rituals.map(r => r.id === id ? data : r);
        else rituals.push(data);

        localStorage.setItem('rituals_elite', JSON.stringify(rituals));
        resetForm();
        show('list');
        render();
    }

    function editRitual(id) {
        const r = rituals.find(x => x.id === id);
        show('add');
        document.getElementById('form-title').innerText = "Edit Ritual";
        document.getElementById('edit-id').value = r.id;
        document.getElementById('task-name').value = r.name;
        document.getElementById('task-start').value = r.start;
        document.getElementById('task-end').value = r.end;
        document.getElementById('del-btn').style.display = 'block';
        document.querySelectorAll('.day-pill').forEach((p, i) => p.classList.toggle('active', r.days.includes(i)));
    }

    function deleteRitual() {
        const id = document.getElementById('edit-id').value;
        rituals = rituals.filter(r => r.id !== id);
        localStorage.setItem('rituals_elite', JSON.stringify(rituals));
        show('list');
        render();
    }

    function resetForm() {
        document.getElementById('edit-id').value = '';
        document.getElementById('task-name').value = '';
        document.getElementById('task-start').value = '';
        document.getElementById('task-end').value = '';
        document.getElementById('del-btn').style.display = 'none';
        document.getElementById('form-title').innerText = "New Ritual";
    }

    function resetApp() {
        if(confirm("Erase all data?")) {
            localStorage.clear();
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
